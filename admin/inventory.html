<!DOCTYPE html><html lang="tr"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Stok Yönetimi | VHEORA Admin</title>  <link rel="stylesheet" href="admin.css?v=6">  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></head><body>  <aside class="sidebar" id="sidebar"></aside>  <main class="main-content">    <div class="page-header">      <div>        <h1 class="page-title">Stok Yönetimi</h1>        <p class="page-subtitle">Ürün stoklarını takip edin ve güncelleyin.</p>      </div>      <div class="action-bar">        <input type="text" class="search-input" id="searchInput" placeholder="Ürün ara..." oninput="filterProducts()">        <button class="btn btn-primary btn-sm" onclick="refreshPage()">🔄 Yenile</button>      </div>    </div>    <div class="cards-grid" id="stockStatsGrid">      <div class="stat-card"><div class="stat-card-value" id="statTotalProducts">-</div><div class="stat-card-label">Toplam Ürün</div></div>      <div class="stat-card"><div class="stat-card-value" id="statTotalStock">-</div><div class="stat-card-label">Toplam Stok</div></div>      <div class="stat-card"><div class="stat-card-value" id="statLowStock">-</div><div class="stat-card-label" style="color:var(--red);">Kritik Stok</div></div>      <div class="stat-card"><div class="stat-card-value" id="statOutOfStock">-</div><div class="stat-card-label" style="color:var(--red);">Stokta Yok</div></div>    </div>    <div class="table-container" id="inventoryContainer">      <p class="empty-state">Yükleniyor...</p>    </div>  </main>  <div class="modal-overlay" id="stockModal">    <div class="modal">      <h2 class="modal-title" id="stockModalTitle">Stok Ayarla</h2>      <p style="color:var(--text-muted);margin-bottom:20px;font-size:0.9rem;" id="stockProductInfo"></p>      <div class="form-row">        <div class="form-group">          <label>İşlem Tipi</label>          <select id="stockType">            <option value="in">Stok Giriş (+)</option>            <option value="out">Stok Çıkış (-)</option>            <option value="adjust">Doğrudan Ayarla</option>          </select>        </div>        <div class="form-group">          <label>Miktar</label>          <input type="number" id="stockQuantity" min="1" value="1">        </div>      </div>      <div class="form-group">        <label>Not</label>        <input type="text" id="stockNote" placeholder="İsteğe bağlı not ekleyin...">      </div>      <div class="form-actions">        <button class="btn btn-ghost" onclick="closeStockModal()">İptal</button>        <button class="btn btn-primary" id="saveStockBtn" onclick="saveStock()">Kaydet</button>      </div>    </div>  </div>  <div class="admin-toast-container" id="adminToast"></div>  <script>    function adminToast(title, msg, type, duration) {      type = type || 'success'; duration = duration || 3500;      var c = document.getElementById('adminToast'); if (!c) return;      var t = document.createElement('div'); t.className = 'admin-toast';      var icons = { success: '\u2705', error: '\u274C', info: '\u2139\uFE0F' };      t.innerHTML = '<div class="admin-toast-icon ' + type + '">' + icons[type] + '</div><div class="admin-toast-body"><div class="admin-toast-title">' + title + '</div><div class="admin-toast-msg">' + msg + '</div></div>';      c.appendChild(t);      setTimeout(function() { t.classList.add('out'); setTimeout(function() { t.remove(); }, 250); }, duration);    }    var API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';    var allProducts = [];    var editingStockProductId = null;    function getToken() {      var t = localStorage.getItem('vheora_token');      if (!t) window.location.href = '/admin/';      return t;    }    function logout() {      localStorage.removeItem('vheora_token');      localStorage.removeItem('vheora_user');      window.location.href = '/admin/';    }    document.getElementById('sidebar').innerHTML = '\n      <div class="sidebar-logo">VHEORA</div>\n      <div class="sidebar-sub">Admin Panel</div>\n      <nav class="sidebar-nav">\n        <div class="sidebar-category">Genel</div>\n        <a href="/admin/dashboard.html" class="sidebar-link">\uD83D\uDCCA Dashboard</a>\n        <div class="sidebar-category">\u0130\u00E7erik Y\u00F6netimi</div>\n        <a href="/admin/products.html" class="sidebar-link">\uD83D\uDC8E \u00DCr\u00FCnler</a>
        <a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a>\n        <a href="/admin/inventory.html" class="sidebar-link active">\uD83D\uDCE6 Stok</a>\n        <a href="/admin/testimonials.html" class="sidebar-link">\u2B50 Yorumlar</a>\n        <div class="sidebar-category">Sipari\u015F Y\u00F6netimi</div>\n        <a href="/admin/orders.html" class="sidebar-link">\uD83D\uDCE6 Sipari\u015Fler</a>\n        <div class="sidebar-category">\u0130leti\u015Fim</div>\n        <a href="/admin/messages.html" class="sidebar-link">\u2709\uFE0F Mesajlar</a>\n        <div class="sidebar-category">Sistem</div>\n        <a href="/admin/settings.html" class="sidebar-link">\u2699\uFE0F Ayarlar</a>\n        <a href="/admin/logs.html" class="sidebar-link">\uD83D\uDCCB Loglar</a>\n        <div style="flex:1"></div>\n        <a href="/" class="sidebar-link">\uD83C\uDF10 Siteye Git</a>\n      </nav>\n      <button class="sidebar-logout" onclick="logout()">\uD83D\uDEAA \u00C7\u0131k\u0131\u015F Yap</button>\n    ';    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menuyu ac/kapat">\u2630</button>');    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }    function closeSidebar() { document.body.classList.remove('sidebar-open'); }    function filterProducts() { renderTable(); }    function refreshPage() { loadInventory(); }    function openStockModal(productId, productName, currentStock) {      editingStockProductId = productId;      document.getElementById('stockProductInfo').textContent = productName + ' (Mevcut Stok: ' + currentStock + ')';      document.getElementById('stockModalTitle').textContent = 'Stok D\u00FCzenle: ' + productName;      document.getElementById('stockType').value = 'in';      document.getElementById('stockQuantity').value = 1;      document.getElementById('stockNote').value = '';      document.getElementById('stockModal').classList.add('active');    }    function closeStockModal() { document.getElementById('stockModal').classList.remove('active'); editingStockProductId = null; }    document.getElementById('stockModal').addEventListener('click', function(e) { if (e.target === this) closeStockModal(); });    async function saveStock() {      if (!editingStockProductId) return;      var btn = document.getElementById('saveStockBtn');      var type = document.getElementById('stockType').value;      var quantity = parseInt(document.getElementById('stockQuantity').value);      if (!quantity || quantity < 1) { adminToast('Hata', 'Ge\u00E7erli bir miktar girin.', 'error'); return; }      var note = document.getElementById('stockNote').value.trim();      await btnAction(btn, 'Kaydediliyor', 'Kaydedildi', async function() {        var res = await fetch(API + '/api/admin/products/' + editingStockProductId + '/stock', {          method: 'PUT',          headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },          body: JSON.stringify({ type: type, quantity: quantity, note: note })        });        var data = await res.json();        if (!res.ok) throw new Error(data.error || 'Hata');        closeStockModal();        loadInventory();        adminToast('Stok G\u00FCncellendi', data.stock_before + ' \u2192 ' + data.stock, 'success');      });    }    function getStockLevel(stock, threshold) {      if (stock === 0) return { label: 'Stokta Yok', cls: 'badge-red', icon: '\uD83D\uDD34' };      if (stock <= threshold) return { label: 'Kritik', cls: 'badge-red', icon: '\uD83D\uDFE0' };      if (stock <= threshold * 2) return { label: 'Az', cls: 'badge-gold', icon: '\uD83D\uDFE1' };      return { label: 'Yeterli', cls: 'badge-green', icon: '\uD83D\uDFE2' };    }    function renderTable() {      var container = document.getElementById('inventoryContainer');      var q = document.getElementById('searchInput').value.toLowerCase();      var filtered = allProducts.filter(function(p) { return p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q); });      if (!filtered.length) {        container.innerHTML = '<p class="empty-state">' + (allProducts.length ? 'Araman\u0131zla e\u015Fle\u015Fen \u00FCr\u00FCn bulunamad\u0131.' : 'Hen\u00FCz \u00FCr\u00FCn eklenmemi\u015F.') + '</p>';        return;      }      container.innerHTML = '\n        <table>\n          <thead><tr><th>\u00DCr\u00FCn</th><th>Kategori</th><th>Mevcut Stok</th><th>E\u015Fik</th><th>Durum</th><th style="text-align:right;">\u0130\u015Flem</th></tr></thead>\n          <tbody>\n            ' + filtered.map(function(p) {              var level = getStockLevel(p.stock, p.low_stock_threshold);              return '\n              <tr>\n                <td style="font-weight:500;">' + p.name + '</td>\n                <td><span class="badge badge-gold">' + p.category + '</span></td>\n                <td style="font-weight:700;font-size:1.1rem;">' + p.stock + '</td>\n                <td style="color:var(--text-muted);">' + p.low_stock_threshold + '</td>\n                <td><span class="badge ' + level.cls + '">' + level.icon + ' ' + level.label + '</span></td>\n                <td style="text-align:right;">\n                  <button class="btn btn-sm btn-primary" onclick="openStockModal(' + p.id + ',\'' + p.name.replace(/'/g,"\\'") + '\',' + p.stock + ')">\uD83D\uDCDD Stok Ayarla</button>\n                </td>\n              </tr>\n            '; }).join('') + '\n          </tbody>\n        </table>\n      ';    }    async function loadInventory() {      var token = getToken();      try {        var res = await fetch(API + '/api/products', { headers: { 'Authorization': 'Bearer ' + token } });        var products = await res.json();        if (!Array.isArray(products)) products = [];        allProducts = products;        var totalStock = 0, lowStock = 0, outOfStock = 0;        allProducts.forEach(function(p) {          totalStock += p.stock || 0;          if (p.stock === 0) outOfStock++;          else if (p.stock <= (p.low_stock_threshold || 5)) lowStock++;        });        document.getElementById('statTotalProducts').textContent = allProducts.length;        document.getElementById('statTotalStock').textContent = totalStock;        document.getElementById('statLowStock').textContent = lowStock;        document.getElementById('statOutOfStock').textContent = outOfStock;        renderTable();      } catch (err) {        document.getElementById('inventoryContainer').innerHTML = '<p class="empty-state">Sunucuya ba\u011Flanamad\u0131.</p>';      }    }    async function btnAction(btn, label, verb, actionFn) {      var origHTML = btn.innerHTML;      btn.disabled = true;      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';      try {        await actionFn();        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);      } catch(e) {        btn.innerHTML = '\u2717 Hata';        btn.className += ' btn-error';        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);      }    }    loadInventory();  </script></body></html>
