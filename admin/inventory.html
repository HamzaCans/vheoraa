<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VHEORA | ADMIN</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="admin.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Stok Yönetimi</h1>
        <p class="page-subtitle">Ürün stoklarını takip edin ve güncelleyin.</p>
      </div>
      <div class="action-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="Ürün ara..." oninput="filterProducts()">
        <button class="btn btn-primary btn-sm" onclick="refreshPage()">🔄 Yenile</button>
      </div>
    </div>
    <div class="cards-grid" id="stockStatsGrid">
      <div class="stat-card"><div class="stat-card-value" id="statTotalProducts">-</div><div class="stat-card-label">Toplam Ürün</div></div>
      <div class="stat-card"><div class="stat-card-value" id="statTotalStock">-</div><div class="stat-card-label">Toplam Stok</div></div>
      <div class="stat-card"><div class="stat-card-value" id="statLowStock">-</div><div class="stat-card-label" style="color:var(--red);">Kritik Stok</div></div>
      <div class="stat-card"><div class="stat-card-value" id="statOutOfStock">-</div><div class="stat-card-label" style="color:var(--red);">Stokta Yok</div></div>
    </div>
    <div class="table-container" id="inventoryContainer">
      <p class="empty-state">Yükleniyor...</p>
    </div>
  </main>

  <div class="modal-overlay" id="stockModal">
    <div class="modal">
      <h2 class="modal-title" id="stockModalTitle">Stok Ayarla</h2>
      <p style="color:var(--text-muted);margin-bottom:20px;font-size:0.9rem;" id="stockProductInfo"></p>
      <div class="form-row">
        <div class="form-group">
          <label>İşlem Tipi</label>
          <select id="stockType">
            <option value="in">📥 Stok Girisi</option>
            <option value="out">📤 Stok Çikisi</option>
            <option value="adjust">🔧 Düzeltme</option>
          </select>
        </div>
        <div class="form-group">
          <label>Miktar</label>
          <input type="number" id="stockQuantity" min="1" value="1">
        </div>
      </div>
      <div class="form-group">
        <label>Not</label>
        <input type="text" id="stockNote" placeholder="Opsiyonel not...">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeStockModal()">İptal</button>
        <button class="btn btn-primary" id="saveStockBtn" onclick="saveStock()">Kaydet</button>
      </div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">Emin misiniz?</h3>
      <p id="confirmText">Bu işlem geri alınamaz.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>
        <button class="btn btn-danger" id="confirmBtn">Sil</button>
      </div>
    </div>
  </div>
  <div id="adminToast" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <script>
    var API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';
    var allProducts = [];
    var editingStockProductId = null;
    function getToken() {
      var t = localStorage.getItem('vheora_token');
      if (!t) window.location.href = '/admin/';
      return t;
    }
    async function fetchJSON(url, options, timeoutMs) {
      timeoutMs = timeoutMs || 15000;
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, timeoutMs);
      try {
        var res = await fetch(url, { ...options, signal: controller.signal });
        if (res.status === 401) { localStorage.removeItem('vheora_token'); window.location.href = '/admin/'; return null; }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } finally { clearTimeout(timeout); }
    }
    async function logout() { try { await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+localStorage.getItem('vheora_token')}}); } catch(e) {} localStorage.removeItem('vheora_token'); localStorage.removeItem('vheora_user'); window.location.href = '/admin/'; }
    function adminToast(title, msg, type, duration) {
      type = type || 'success'; duration = duration || 3500;
      var c = document.getElementById('adminToast'); if (!c) return;
      var t = document.createElement('div'); t.className = 'admin-toast';
      var icons = { success: '\u2705', error: '\u274C', info: '\u2139\uFE0F' };
      t.innerHTML = '<div class="admin-toast-icon ' + type + '">' + icons[type] + '</div><div class="admin-toast-body"><div class="admin-toast-title">' + title + '</div><div class="admin-toast-msg">' + msg + '</div></div>';
      c.appendChild(t);
      setTimeout(function() { t.classList.add('out'); setTimeout(function() { t.remove(); }, 250); }, duration);
    }
    var confirmResolve = null;
    function showConfirm(title, text, btnText) {
      btnText = btnText || 'Sil';
      return new Promise(function(resolve) {
        confirmResolve = resolve;
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmText').textContent = text;
        document.getElementById('confirmBtn').textContent = btnText;
        document.getElementById('confirmOverlay').classList.add('active');
      });
    }
    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmResolve) { confirmResolve(false); confirmResolve = null; }
    }
    document.getElementById('confirmBtn').addEventListener('click', function() {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmResolve) { confirmResolve(true); confirmResolve = null; }
    });
    document.getElementById('confirmOverlay').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeConfirm();
    });
    async function btnAction(btn, label, verb, actionFn) {
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';
      try {
        await actionFn();
        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;
        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);
      } catch(e) {
        btn.innerHTML = '\u2717 Hata';
        btn.className += ' btn-error';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);
      }
    }

    document.getElementById('sidebar').innerHTML = '\n      <div class="sidebar-logo">VHEORA</div>\n      <div class="sidebar-sub">Admin Panel</div>\n      <nav class="sidebar-nav">\n        <div class="sidebar-category">Genel</div>\n        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>\n        <div class="sidebar-category">İçerik Yönetimi</div>\n        <a href="/admin/products.html" class="sidebar-link">💎 Ürünler</a>\n        <a href="/admin/inventory.html" class="sidebar-link active">📦 Stok</a>\n        <a href="/admin/testimonials.html" class="sidebar-link">⭐ Yorumlar</a>\n        <div class="sidebar-category">Sipariş Yönetimi</div>\n        <a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a>\n        <div class="sidebar-category">İletişim</div>\n        <a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a>\n        <div class="sidebar-category">Sistem</div>\n        <a href="/admin/settings.html" class="sidebar-link">⚙️ Ayarlar</a>\n        <a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a>\n        <div style="flex:1"></div>\n        <a href="/" class="sidebar-link">🌐 Siteye Git</a>\n      </nav>\n      <button class="sidebar-logout" onclick="logout()">🚪 Çıkış Yap</button>\n    ';
    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');
    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Men\u00FCy\u00FC a\u00E7/kapat">\u2630</button>');
    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
    function closeSidebar() { document.body.classList.remove('sidebar-open'); }
    document.body.insertAdjacentHTML('beforeend', '<nav class="admin-bottombar"><div class="admin-bottombar-inner"><a href="/admin/dashboard.html"><span class="bb-icon">📊</span>Dash</a><a href="/admin/products.html" class="active"><span class="bb-icon">💎</span>Ürünler</a><a href="/admin/orders.html"><span class="bb-icon">📦</span>Sipariş</a><a href="/admin/messages.html"><span class="bb-icon">✉️</span>Mesaj</a><a href="/admin/settings.html"><span class="bb-icon">⚙️</span>Ayarlar</a><a href="/admin/logs.html"><span class="bb-icon">📋</span>Loglar</a></div></nav>');

    function filterProducts() { renderTable(); }
    function refreshPage() { loadInventory(); }

    function openStockModal(productId, productName, currentStock) {
      editingStockProductId = productId;
      document.getElementById('stockProductInfo').textContent = productName + ' (Mevcut Stok: ' + currentStock + ')';
      document.getElementById('stockModalTitle').textContent = 'Stok Düzenle: ' + productName;
      document.getElementById('stockType').value = 'in';
      document.getElementById('stockQuantity').value = 1;
      document.getElementById('stockNote').value = '';
      document.getElementById('stockModal').classList.add('active');
    }
    function closeStockModal() {
      document.getElementById('stockModal').classList.remove('active');
      editingStockProductId = null;
    }
    document.getElementById('stockModal').addEventListener('click', function(e) {
      if (e.target === this) closeStockModal();
    });

    async function saveStock() {
      if (!editingStockProductId) return;
      var btn = document.getElementById('saveStockBtn');
      var type = document.getElementById('stockType').value;
      var quantity = parseInt(document.getElementById('stockQuantity').value);
      if (!quantity || quantity < 1) { adminToast('Hata', 'Geçerli bir miktar girin.', 'error'); return; }
      var note = document.getElementById('stockNote').value.trim();
      await btnAction(btn, 'Kaydediliyor', 'Kaydedildi', async function() {
        var res = await fetch(API + '/api/admin/products/' + editingStockProductId + '/stock', {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: type, quantity: quantity, note: note })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Hata');
        closeStockModal();
        loadInventory();
        adminToast('Stok Güncellendi', data.stock_before + ' → ' + data.stock, 'success');
      });
    }

    function getStockLevel(stock, threshold) {
      if (stock === 0) return { label: 'Stokta Yok', cls: 'badge-red', icon: '🔴' };
      if (stock <= threshold) return { label: 'Kritik', cls: 'badge-red', icon: '🟠' };
      if (stock <= threshold * 2) return { label: 'Az', cls: 'badge-gold', icon: '🟡' };
      return { label: 'Yeterli', cls: 'badge-green', icon: '🟢' };
    }

    function renderTable() {
      var container = document.getElementById('inventoryContainer');
      var q = document.getElementById('searchInput').value.toLowerCase();
      var filtered = allProducts.filter(function(p) {
        return p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
      });
      if (!filtered.length) {
        container.innerHTML = '<p class="empty-state">' + (allProducts.length ? 'Aramanızla eşleşen ürün bulunamadı.' : 'Henüz ürün eklenmemiş.') + '</p>';
        return;
      }
      var catColors = { yuzuk: '#d4a853', bileklik: '#e07c4f', kolye: '#5cb3e0', kupe: '#b07cd4', set: '#5ce0a0' };
      var catLabels = { yuzuk: 'Yüzük', bileklik: 'Bileklik', kolye: 'Kolye', kupe: 'Küpe', set: 'Set Takı' };
      container.innerHTML = '<table><thead><tr><th>Görsel</th><th>Ürün</th><th>Kategori</th><th>Gram</th><th>Mevcut Stok</th><th>Eşik</th><th>Durum</th><th style="text-align:right;">İşlem</th></tr></thead><tbody>' +
        filtered.map(function(p) {
          var level = getStockLevel(p.stock, p.low_stock_threshold);
          var imgSrc = p.images && p.images.length ? p.images[0] : (p.image ? (p.image.startsWith('data:') ? p.image : API + p.image) : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><rect fill="%23111118" width="50" height="50"/></svg>');
          var catColor = catColors[p.category] || '#d4a853';
          var catLabel = catLabels[p.category] || p.category;
          return '<tr><td><img src="' + imgSrc + '" alt="' + p.name + '" class="product-thumb"></td>' +
            '<td style="font-weight:500;">' + p.name + '</td>' +
            '<td><span class="badge" style="background:' + catColor + '15;color:' + catColor + ';">' + catLabel + '</span></td>' +
            '<td>' + (p.gram || '-') + '</td>' +
            '<td style="font-weight:700;font-size:1.1rem;">' + (p.stock || 0) + '</td>' +
            '<td style="color:var(--text-muted);">' + (p.low_stock_threshold || 5) + '</td>' +
            '<td><span class="badge ' + level.cls + '">' + level.icon + ' ' + level.label + '</span></td>' +
            '<td style="text-align:right;">' +
            '<button class="btn btn-sm btn-primary" onclick="openStockModal(' + p.id + ',\'' + p.name.replace(/'/g, "\\'") + '\',' + (p.stock || 0) + ')">📝 Stok Ayarla</button>' +
            '</td></tr>';
        }).join('') +
        '</tbody></table>';
    }

    async function loadInventory() {
      var token = getToken();
      try {
        var products = await fetchJSON(API + '/api/admin/products', { headers: { 'Authorization': 'Bearer ' + token } });
        if (products == null) return;
        if (!Array.isArray(products)) products = [];
        allProducts = products;
        var totalStock = 0, lowStock = 0, outOfStock = 0;
        allProducts.forEach(function(p) {
          totalStock += p.stock || 0;
          if (p.stock === 0) outOfStock++;
          else if (p.stock <= (p.low_stock_threshold || 5)) lowStock++;
        });
        document.getElementById('statTotalProducts').textContent = allProducts.length;
        document.getElementById('statTotalStock').textContent = totalStock;
        document.getElementById('statLowStock').textContent = lowStock;
        document.getElementById('statOutOfStock').textContent = outOfStock;
        renderTable();
      } catch (err) {
        document.getElementById('inventoryContainer').innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';
      }
    }
    loadInventory();
  </script>
</body>
</html>
