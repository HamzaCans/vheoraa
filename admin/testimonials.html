<!DOCTYPE html><html lang="tr"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Yorumlar | VHEORA Admin</title>  <link rel="stylesheet" href="admin.css?v=6">  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></head><body>  <aside class="sidebar" id="sidebar"></aside>  <main class="main-content">    <div class="page-header">      <div>        <h1 class="page-title">Yorumlar</h1>        <p class="page-subtitle">Müşteri yorumlarını yönetin ve onaylayın.</p>      </div>    </div>    <div class="table-container" id="testimonialsContainer">      <p class="empty-state">Yükleniyor...</p>    </div>  </main>  <div class="admin-toast-container" id="adminToast"></div>  <div class="confirm-overlay" id="confirmOverlay">    <div class="confirm-modal">      <h3 id="confirmTitle">Emin misiniz?</h3>      <p id="confirmText">Bu işlem geri alınamaz.</p>      <div class="confirm-actions">        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>        <button class="btn btn-danger" id="confirmBtn">Sil</button>      </div>    </div>  </div>  <script>    function adminToast(title, msg, type = 'success', duration = 3500) {      const c = document.getElementById('adminToast'); if (!c) return;      const t = document.createElement('div'); t.className = 'admin-toast';      const icons = { success: '✓', error: '✗', info: 'ℹ' };      t.innerHTML = `<div class="admin-toast-icon ${type}">${icons[type]}</div><div class="admin-toast-body"><div class="admin-toast-title">${title}</div><div class="admin-toast-msg">${msg}</div></div>`;      c.appendChild(t);      setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 250); }, duration);    }    let confirmResolve = null;    function showConfirm(title, text, btnText = 'Sil') {      return new Promise((resolve) => {        document.getElementById('confirmTitle').textContent = title;        document.getElementById('confirmText').textContent = text;        document.getElementById('confirmBtn').textContent = btnText;        document.getElementById('confirmOverlay').classList.add('active');        confirmResolve = resolve;      });    }    function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); if (confirmResolve) { confirmResolve(false); confirmResolve = null; } }    document.getElementById('confirmBtn').addEventListener('click', () => { document.getElementById('confirmOverlay').classList.remove('active'); if (confirmResolve) { confirmResolve(true); confirmResolve = null; } });    document.getElementById('confirmOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeConfirm(); });    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';    function getToken() {      const t = localStorage.getItem('vheora_token');      if (!t) window.location.href = '/admin/';      return t;    }    document.getElementById('sidebar').innerHTML = `      <div class="sidebar-logo">VHEORA</div>      <div class="sidebar-sub">Admin Panel</div>      <nav class="sidebar-nav">                <div class="sidebar-category">Genel</div>        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>                <div class="sidebar-category">İçerik Yönetimi</div>        <a href="/admin/products.html" class="sidebar-link">💎 Ürünler</a>
        <a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a>        <a href="/admin/testimonials.html" class="sidebar-link active">⭐ Yorumlar</a>                
        <div class="sidebar-category">Sipariş Yönetimi</div>
        <a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a>
        <div class="sidebar-category">İletişim</div>        <a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a>                <div class="sidebar-category">Sistem</div>        <a href="/admin/settings.html" class="sidebar-link">🔧 Ayarlar</a>        <a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a>                <div style="flex:1"></div>        <a href="/" class="sidebar-link">🌐 Siteye Git</a>      <button class="sidebar-logout" onclick="logout()">🚪 Çıkış Yap</button>    `;    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menuyu ac/kapat">☰</button>');    function toggleSidebar() {      document.body.classList.toggle('sidebar-open');    }    function closeSidebar() {      document.body.classList.remove('sidebar-open');    }    function logout() {      localStorage.removeItem('vheora_token');      window.location.href = '/admin/';    }    async function approveTestimonial(id) {
      var token = getToken();
      var btn = event.target;
      await btnAction(btn, 'Onaylan\u0131yor', 'Onayland\u0131', async function() {
        await fetch(API + '/api/admin/testimonials/' + id + '/approve', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
        loadTestimonials();
      });
    }/api/admin/testimonials/${id}/approve`, {        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }      });      loadTestimonials();      adminToast('Onaylandı', 'Yorum başarıyla onaylandı.', 'success');    }    async function deleteTestimonial(id) {
      var confirmed = await showConfirm('Yorumu Sil', 'Bu yorum kal\u0131c\u0131 olarak silinecek.');
      if (!confirmed) return;
      var token = getToken();
      var btns = document.querySelectorAll('.btn-danger');
      var btn = btns[btns.length - 1];
      await btnAction(btn, 'Siliniyor', 'Silindi', async function() {
        await fetch(API + '/api/admin/testimonials/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        loadTestimonials();
      });
    }/api/admin/testimonials/${id}`, {        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }      });      loadTestimonials();      adminToast('Silindi', 'Yorum başarıyla silindi.', 'success');    }    
    async function btnAction(btn, label, verb, actionFn) {
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';
      try {
        await actionFn();
        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;
        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);
      } catch(e) {
        btn.innerHTML = '\u2717 Hata';
        btn.className += ' btn-error';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);
      }
    }
    async function loadTestimonials() {      const container = document.getElementById('testimonialsContainer');      const token = getToken();      try {        const res = await fetch(`${API}/api/admin/testimonials`, { headers: { 'Authorization': `Bearer ${token}` } });        const testimonials = await res.json();        if (!testimonials.length) {          container.innerHTML = '<p class="empty-state">Henüz yorum yok.</p>';          return;        }        container.innerHTML = `          <table>            <thead><tr><th>Tarih</th><th>İsim</th><th>Lokasyon</th><th>Yorum</th><th>Puan</th><th>Durum</th><th style="text-align:right;">İşlem</th></tr></thead>            <tbody>              ${testimonials.map(t => `                <tr>                  <td style="color:var(--text-muted);font-size:0.8rem;">${new Date(t.created_at).toLocaleDateString('tr-TR')}</td>                  <td style="font-weight:500;">${t.name}</td>                  <td style="color:var(--text-muted);">${t.location || '-'}</td>                  <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);">${t.text.substring(0, 80)}${t.text.length > 80 ? '...' : ''}</td>                  <td>${'★'.repeat(t.rating)}</td>                  <td><span class="badge ${t.is_approved ? 'badge-green' : 'badge-red'}">${t.is_approved ? 'Onaylı' : 'Bekliyor'}</span></td>                  <td style="text-align:right;">                    ${!t.is_approved ? `<button class="btn btn-sm btn-primary" onclick="approveTestimonial(${t.id})">✓ Onayla</button>` : ''}                    <button class="btn btn-sm btn-danger" onclick="deleteTestimonial(${t.id})">🗑️</button>                  </td>                </tr>              `).join('')}            </tbody>          </table>        `;      } catch (err) {        container.innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';      }    }    loadTestimonials();  </script></body></html>
