<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VHEORA | ADMIN</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="admin.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Yorumlar</h1>
        <p class="page-subtitle">Müşteri yorumlarını yönetin ve onaylayın.</p>
      </div>
    </div>
    <div class="tabs-scroll">
      <div class="tabs" id="testimonialTabs">
        <button class="tab-btn active" data-filter="all">📋 Tümü</button>
        <button class="tab-btn" data-filter="pending">⏳ Bekleyen</button>
        <button class="tab-btn" data-filter="approved">✅ Onaylı</button>
      </div>
    </div>
    <div class="table-container" id="testimonialsContainer">
      <p class="empty-state">Yükleniyor...</p>
    </div>
  </main>
  <div class="admin-toast-container" id="adminToast"></div>
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">Emin misiniz?</h3>
      <p id="confirmText">Bu işlem geri alınamaz.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>
        <button class="btn btn-danger" id="confirmBtn">Sil</button>
      </div>
    </div>
  </div>

  <script>
    var API = window.location.protocol === 'file:' ? 'http://localhost:3001' : window.location.hostname === 'vheora.com' || window.location.hostname === 'www.vheora.com' ? 'https://vheora.vercel.app' : '';
    var currentFilter = 'all';
    var allTestimonials = [];

    function getToken() {
      var t = localStorage.getItem('vheora_token');
      if (!t) { window.location.href = '/admin/'; return null; }
      return t;
    }

    function adminToast(title, msg, type, duration) {
      type = type || 'success'; duration = duration || 3500;
      var c = document.getElementById('adminToast'); if (!c) return;
      var t = document.createElement('div'); t.className = 'admin-toast';
      var icons = { success: '✅', error: '❌', info: 'ℹ️' };
      t.innerHTML = '<div class="admin-toast-icon ' + type + '">' + icons[type] + '</div><div class="admin-toast-body"><div class="admin-toast-title">' + title + '</div><div class="admin-toast-msg">' + msg + '</div></div>';
      c.appendChild(t);
      setTimeout(function() { t.classList.add('out'); setTimeout(function() { t.remove(); }, 250); }, duration);
    }

    var confirmResolve = null;
    function showConfirm(title, text, btnText) {
      btnText = btnText || 'Sil';
      return new Promise(function(resolve) {
        confirmResolve = resolve;
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmText').textContent = text;
        document.getElementById('confirmBtn').textContent = btnText;
        document.getElementById('confirmOverlay').classList.add('active');
      });
    }
    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmResolve) confirmResolve(false);
      confirmResolve = null;
    }
    document.getElementById('confirmBtn').addEventListener('click', function() {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmResolve) confirmResolve(true);
      confirmResolve = null;
    });

    document.getElementById('sidebar').innerHTML = '<div class="sidebar-logo">VHEORA</div><div class="sidebar-sub">Admin Panel</div><nav class="sidebar-nav"><div class="sidebar-category">Genel</div><a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a><div class="sidebar-category">İçerik Yönetimi</div><a href="/admin/products.html" class="sidebar-link">💎 Ürünler</a><a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a><a href="/admin/testimonials.html" class="sidebar-link active">⭐ Yorumlar</a><div class="sidebar-category">Sipariş Yönetimi</div><a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a><div class="sidebar-category">İletişim</div><a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a><div class="sidebar-category">Sistem</div><a href="/admin/settings.html" class="sidebar-link">⚙️ Ayarlar</a><a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a><div style="flex:1"></div><a href="/" class="sidebar-link">🌐 Siteye Git</a></nav><button class="sidebar-logout" onclick="logout()">🚪 Çıkış Yap</button>';
    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');
    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menüyü aç/kapat">☰</button>');
    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
    function closeSidebar() { document.body.classList.remove('sidebar-open'); }

    document.body.insertAdjacentHTML('beforeend', '<nav class="admin-bottombar"><div class="admin-bottombar-inner"><a href="/admin/dashboard.html"><span class="bb-icon">📊</span>Dash</a><a href="/admin/products.html"><span class="bb-icon">💎</span>Ürünler</a><a href="/admin/orders.html"><span class="bb-icon">📦</span>Sipariş</a><a href="/admin/messages.html"><span class="bb-icon">✉️</span>Mesaj</a><a href="/admin/settings.html"><span class="bb-icon">⚙️</span>Ayarlar</a><a href="/admin/logs.html"><span class="bb-icon">📋</span>Loglar</a></div></nav>');

    function logout() {
      try { fetch(API + '/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() } }); } catch(e) {}
      localStorage.removeItem('vheora_token');
      localStorage.removeItem('vheora_user');
      window.location.href = '/admin/';
    }

    document.querySelectorAll('#testimonialTabs .tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#testimonialTabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderTestimonials();
      });
    });

    function renderStars(count) {
      var s = '';
      for (var i = 0; i < 5; i++) s += i < count ? '⭐' : '☆';
      return s;
    }

    function renderTestimonials() {
      var container = document.getElementById('testimonialsContainer');
      var filtered = allTestimonials;
      if (currentFilter === 'pending') filtered = allTestimonials.filter(function(t) { return !t.is_approved; });
      if (currentFilter === 'approved') filtered = allTestimonials.filter(function(t) { return t.is_approved; });

      if (!filtered.length) {
        container.innerHTML = '<p class="empty-state">Bu kategoride yorum yok.</p>';
        return;
      }
      var html = '<table><thead><tr><th>Tarih</th><th>İsim</th><th>Lokasyon</th><th>Yorum</th><th>Puan</th><th>Durum</th><th style="text-align:right;">İşlem</th></tr></thead><tbody>';
      filtered.forEach(function(t) {
        html += '<tr>';
        html += '<td style="color:var(--text-muted);font-size:0.8rem;">' + new Date(t.created_at).toLocaleDateString('tr-TR') + '</td>';
        html += '<td style="font-weight:500;">' + t.name + '</td>';
        html += '<td style="color:var(--text-muted);">' + (t.location || '-') + '</td>';
        html += '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);">' + t.text.substring(0, 80) + (t.text.length > 80 ? '...' : '') + '</td>';
        html += '<td>' + renderStars(t.rating) + '</td>';
        html += '<td><span class="badge ' + (t.is_approved ? 'badge-green' : 'badge-red') + '">' + (t.is_approved ? 'Onaylı' : 'Bekliyor') + '</span></td>';
        html += '<td style="text-align:right;">';
        if (!t.is_approved) html += '<button class="btn btn-sm btn-primary" onclick="approveTestimonial(' + t.id + ', this)">✅ Onayla</button> ';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteTestimonial(' + t.id + ', this)">🗑️ Sil</button>';
        html += '</td></tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    async function approveTestimonial(id, btn) {
      var token = getToken();
      btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span>...';
      try {
        await fetch(API + '/api/admin/testimonials/' + id + '/approve', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
        btn.innerHTML = '✓ Onaylandı'; btn.className = btn.className.replace('btn-primary', 'btn-success');
        adminToast('Onaylandı', 'Yorum onaylandı.', 'success');
        setTimeout(function() { loadTestimonials(); }, 1000);
      } catch(e) { btn.innerHTML = '✗ Hata'; btn.disabled = false; }
    }

    async function deleteTestimonial(id, btn) {
      var confirmed = await showConfirm('Yorumu Sil', 'Bu yorum kalıcı olarak silinecek.');
      if (!confirmed) return;
      var token = getToken();
      btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span>...';
      try {
        await fetch(API + '/api/admin/testimonials/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        btn.innerHTML = '✓ Silindi'; btn.className = btn.className.replace('btn-danger', 'btn-success');
        adminToast('Silindi', 'Yorum silindi.', 'success');
        setTimeout(function() { loadTestimonials(); }, 1000);
      } catch(e) { btn.innerHTML = '✗ Hata'; btn.disabled = false; }
    }

    async function loadTestimonials() {
      var container = document.getElementById('testimonialsContainer');
      var token = getToken();
      try {
        var res = await fetch(API + '/api/admin/testimonials', { headers: { 'Authorization': 'Bearer ' + token } });
        allTestimonials = await res.json();
        renderTestimonials();
      } catch (err) {
        container.innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';
      }
    }

    loadTestimonials();
  </script>
</body>
</html>
