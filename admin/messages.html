<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VHEORA | ADMIN</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="admin.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Mesajlar</h1>
        <p class="page-subtitle">İletişim ve teklif talepleri.</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="exportCSV()">📊 CSV Export</button>
    </div>
    <div class="tabs-scroll">
      <div class="tabs" id="messageTabs">
        <button class="tab-btn active" data-type="all">📋 Tümü</button>
        <button class="tab-btn" data-type="contact">✉️ İletişim</button>
        <button class="tab-btn" data-type="quote">💰 Teklif</button>
        <button class="tab-btn" data-type="unread">🔴 Okunmamış</button>
      </div>
    </div>
    <div class="table-container" id="messagesContainer">
      <p class="empty-state">Yükleniyor...</p>
    </div>
  </main>
  <div class="admin-toast-container" id="adminToast"></div>
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">Emin misiniz?</h3>
      <p id="confirmText">Bu işlem geri alınamaz.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>
        <button class="btn btn-danger" id="confirmBtn">Sil</button>
      </div>
    </div>
  </div>

  <script src="shared-functions.js"></script>
  <script>
    initSidebar('messages');
    var currentFilter = 'all';

    document.querySelectorAll('#messageTabs .tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#messageTabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-type');
        loadMessages();
      });
    });

    function exportCSV() {
      var token = getToken();
      fetch(API + '/api/admin/messages', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var csv = 'Tarih,İsim,Email,Telefon,Konu,Tip,Durum\n';
          data.forEach(function(m) {
            csv += '"' + (m.created_at||'') + '","' + (m.first_name||'') + ' ' + (m.last_name||'') + '","' + (m.email||'') + '","' + (m.phone||'') + '","' + (m.subject||m.product_name||'') + '","' + (m.type||'') + '","' + (m.is_read?'Okundu':'Yeni') + '"\n';
          });
          var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
          var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mesajlar.csv'; a.click();
        });
    }

    async function markRead(id, btn) {
      var token = getToken();
      btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Okunuyor...';
      try {
        await fetch(API + '/api/admin/messages/' + id + '/read', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
        btn.innerHTML = '✓ Okundu'; btn.className = btn.className.replace('btn-primary','btn-success');
        setTimeout(function() { loadMessages(); }, 1000);
      } catch(e) { btn.innerHTML = '✗ Hata'; btn.disabled = false; }
    }

    async function deleteMessage(id, btn) {
      var confirmed = await showConfirm('Mesajı Sil', 'Bu mesaj kalıcı olarak silinecek.');
      if (!confirmed) return;
      var token = getToken();
      btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Siliniyor...';
      try {
        await fetch(API + '/api/admin/messages/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        btn.innerHTML = '✓ Silindi'; btn.className = btn.className.replace('btn-danger','btn-success');
        setTimeout(function() { loadMessages(); }, 1000);
      } catch(e) { btn.innerHTML = '✗ Hata'; btn.disabled = false; }
    }

    async function loadMessages() {
      var container = document.getElementById('messagesContainer');
      var token = getToken();
      try {
        var url;
        if (currentFilter === 'unread') {
          url = API + '/api/admin/messages?type=unread';
        } else {
          url = currentFilter === 'all' ? API + '/api/admin/messages' : API + '/api/admin/messages?type=' + currentFilter;
        }
        var messages = await fetchJSON(url, { headers: { 'Authorization': 'Bearer ' + token } });
        if (messages == null) return;
        if (!Array.isArray(messages) || !messages.length) {
          container.innerHTML = '<p class="empty-state">Henüz mesaj yok.</p>';
          return;
        }
        var html = '<table><thead><tr><th>Tarih</th><th>İsim</th><th>İletişim</th><th>Konu</th><th>Detay</th><th>Tip</th><th>Durum</th><th style="text-align:right;">İşlem</th></tr></thead><tbody>';
        messages.forEach(function(m) {
          var date = parseDate(m.created_at);
          html += '<tr style="' + (!m.is_read ? 'background:rgba(212,168,83,0.04);' : '') + '">';
          html += '<td style="color:var(--text-muted);font-size:0.8rem;">' + (date ? date.toLocaleDateString('tr-TR', { timeZone: userTimezone }) + ' ' + date.toLocaleTimeString('tr-TR', { timeZone: userTimezone, hour:'2-digit',minute:'2-digit' }) : '-') + '</td>';
          html += '<td style="font-weight:' + (!m.is_read ? '600' : '400') + ';">' + (m.first_name || '-') + ' ' + (m.last_name || '') + '</td>';
          html += '<td>' + (m.email || m.phone || '-') + '</td>';
          html += '<td>' + (m.subject || m.product_name || '-') + '</td>';
          html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);">' + (m.message || '').substring(0, 60) + ((m.message || '').length > 60 ? '...' : '') + '</td>';
          html += '<td><span class="badge ' + (m.type === 'quote' ? 'badge-gold' : 'badge-green') + '">' + (m.type === 'quote' ? 'Teklif' : 'İletişim') + '</span></td>';
          html += '<td><span class="badge ' + (m.is_read ? 'badge-green' : 'badge-red') + '">' + (m.is_read ? 'Okundu' : 'Yeni') + '</span></td>';
          html += '<td style="text-align:right;">';
          if (!m.is_read) html += '<button class="btn btn-sm btn-primary" onclick="markRead(' + m.id + ', this)">👁️ Okundu</button> ';
          html += '<button class="btn btn-sm btn-danger" onclick="deleteMessage(' + m.id + ', this)">🗑️ Sil</button>';
          html += '</td></tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';
      }
    }

    loadMessages();
  </script>
</body>
</html>
