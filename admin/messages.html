<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VHEORA | ADMIN</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="admin.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Mesajlar</h1>
        <p class="page-subtitle">İletişim ve teklif talepleri.</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="exportCSV()">📊 CSV Export</button>
    </div>
    <div class="tabs-scroll">
      <div class="tabs" id="messageTabs">
        <button class="tab-btn active" data-type="all">📋 Tümü</button>
        <button class="tab-btn" data-type="contact">✉️ İletişim</button>
        <button class="tab-btn" data-type="quote">💰 Teklif</button>
        <button class="tab-btn" data-type="unread">🔴 Okunmamış</button>
      </div>
    </div>
    <div class="table-container" id="messagesContainer">
      <p class="empty-state">Yükleniyor...</p>
    </div>
  </main>
  <div class="admin-toast-container" id="adminToast"></div>
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">Emin misiniz?</h3>
      <p id="confirmText">Bu işlem geri alınamaz.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>
        <button class="btn btn-danger" id="confirmBtn">Sil</button>
      </div>
    </div>
  </div>

  <script>
    var API = window.location.protocol === 'file:' ? 'http://localhost:3001' : window.location.hostname === 'vheora.com' || window.location.hostname === 'www.vheora.com' ? 'https://vheora.vercel.app' : '';
    var currentFilter = 'all';

    function getToken() {
      var t = localStorage.getItem('vheora_token');
      if (!t) { window.location.href = '/admin/'; return null; }
      return t;
    }

    function adminToast(title, msg, type, duration) {
      type = type || 'success'; duration = duration || 3500;
      var c = document.getElementById('adminToast'); if (!c) return;
      var t = document.createElement('div'); t.className = 'admin-toast';
      var icons = { success: '✅', error: '❌', info: 'ℹ️' };
      t.innerHTML = '<div class="admin-toast-icon ' + type + '">' + icons[type] + '</div><div class="admin-toast-body"><div class="admin-toast-title">' + title + '</div><div class="admin-toast-msg">' + msg + '</div></div>';
      c.appendChild(t);
      setTimeout(function() { t.classList.add('out'); setTimeout(function() { t.remove(); }, 250); }, duration);
    }

    var confirmResolve = null;
    function showConfirm(title, text, btnText) {
      btnText = btnText || 'Sil';
      return new Promise(function(resolve) {
        confirmResolve = resolve;
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmText').textContent = text;
        document.getElementById('confirmBtn').textContent = btnText;
        document.getElementById('confirmOverlay').classList.add('active');
      });
    }
    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmResolve) confirmResolve(false);
      confirmResolve = null;
    }
    document.getElementById('confirmBtn').addEventListener('click', function() {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (confirmResolve) confirmResolve(true);
      confirmResolve = null;
    });

    document.getElementById('sidebar').innerHTML = '<div class="sidebar-logo">VHEORA</div><div class="sidebar-sub">Admin Panel</div><nav class="sidebar-nav"><div class="sidebar-category">Genel</div><a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a><div class="sidebar-category">İçerik Yönetimi</div><a href="/admin/products.html" class="sidebar-link">💎 Ürünler</a><a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a><a href="/admin/testimonials.html" class="sidebar-link">⭐ Yorumlar</a><div class="sidebar-category">Sipariş Yönetimi</div><a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a><div class="sidebar-category">İletişim</div><a href="/admin/messages.html" class="sidebar-link active">✉️ Mesajlar</a><div class="sidebar-category">Sistem</div><a href="/admin/settings.html" class="sidebar-link">⚙️ Ayarlar</a><a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a><div style="flex:1"></div><a href="/" class="sidebar-link">🌐 Siteye Git</a></nav><button class="sidebar-logout" onclick="logout()">🚪 Çıkış Yap</button>';
    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');
    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menüyü aç/kapat">☰</button>');
    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
    function closeSidebar() { document.body.classList.remove('sidebar-open'); }

    document.body.insertAdjacentHTML('beforeend', '<nav class="admin-bottombar"><div class="admin-bottombar-inner"><a href="/admin/dashboard.html"><span class="bb-icon">📊</span>Dash</a><a href="/admin/products.html"><span class="bb-icon">💎</span>Ürünler</a><a href="/admin/orders.html"><span class="bb-icon">📦</span>Sipariş</a><a href="/admin/messages.html" class="active"><span class="bb-icon">✉️</span>Mesaj</a><a href="/admin/settings.html"><span class="bb-icon">⚙️</span>Ayarlar</a><a href="/admin/logs.html"><span class="bb-icon">📋</span>Loglar</a></div></nav>');

    function logout() {
      try { fetch(API + '/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() } }); } catch(e) {}
      localStorage.removeItem('vheora_token');
      localStorage.removeItem('vheora_user');
      window.location.href = '/admin/';
    }

    document.querySelectorAll('#messageTabs .tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#messageTabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-type');
        loadMessages();
      });
    });

    function exportCSV() {
      var token = getToken();
      fetch(API + '/api/admin/messages', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var csv = 'Tarih,İsim,Email,Telefon,Konu,Tip,Durum\n';
          data.forEach(function(m) {
            csv += '"' + (m.created_at||'') + '","' + (m.first_name||'') + ' ' + (m.last_name||'') + '","' + (m.email||'') + '","' + (m.phone||'') + '","' + (m.subject||m.product_name||'') + '","' + (m.type||'') + '","' + (m.is_read?'Okundu':'Yeni') + '"\n';
          });
          var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
          var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mesajlar.csv'; a.click();
        });
    }

    async function markRead(id, btn) {
      var token = getToken();
      btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Okunuyor...';
      try {
        await fetch(API + '/api/admin/messages/' + id + '/read', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
        btn.innerHTML = '✓ Okundu'; btn.className = btn.className.replace('btn-primary','btn-success');
        setTimeout(function() { loadMessages(); }, 1000);
      } catch(e) { btn.innerHTML = '✗ Hata'; btn.disabled = false; }
    }

    async function deleteMessage(id, btn) {
      var confirmed = await showConfirm('Mesajı Sil', 'Bu mesaj kalıcı olarak silinecek.');
      if (!confirmed) return;
      var token = getToken();
      btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Siliniyor...';
      try {
        await fetch(API + '/api/admin/messages/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        btn.innerHTML = '✓ Silindi'; btn.className = btn.className.replace('btn-danger','btn-success');
        setTimeout(function() { loadMessages(); }, 1000);
      } catch(e) { btn.innerHTML = '✗ Hata'; btn.disabled = false; }
    }

    async function loadMessages() {
      var container = document.getElementById('messagesContainer');
      var token = getToken();
      try {
        var url;
        if (currentFilter === 'unread') {
          url = API + '/api/admin/messages?type=unread';
        } else {
          url = currentFilter === 'all' ? API + '/api/admin/messages' : API + '/api/admin/messages?type=' + currentFilter;
        }
        var res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        var messages = await res.json();
        if (!messages.length) {
          container.innerHTML = '<p class="empty-state">Henüz mesaj yok.</p>';
          return;
        }
        var html = '<table><thead><tr><th>Tarih</th><th>İsim</th><th>İletişim</th><th>Konu</th><th>Detay</th><th>Tip</th><th>Durum</th><th style="text-align:right;">İşlem</th></tr></thead><tbody>';
        messages.forEach(function(m) {
          var date = new Date(m.created_at);
          html += '<tr style="' + (!m.is_read ? 'background:rgba(212,168,83,0.04);' : '') + '">';
          html += '<td style="color:var(--text-muted);font-size:0.8rem;">' + date.toLocaleDateString('tr-TR') + ' ' + date.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'}) + '</td>';
          html += '<td style="font-weight:' + (!m.is_read ? '600' : '400') + ';">' + (m.first_name || '-') + ' ' + (m.last_name || '') + '</td>';
          html += '<td>' + (m.email || m.phone || '-') + '</td>';
          html += '<td>' + (m.subject || m.product_name || '-') + '</td>';
          html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);">' + (m.message || '').substring(0, 60) + ((m.message || '').length > 60 ? '...' : '') + '</td>';
          html += '<td><span class="badge ' + (m.type === 'quote' ? 'badge-gold' : 'badge-green') + '">' + (m.type === 'quote' ? 'Teklif' : 'İletişim') + '</span></td>';
          html += '<td><span class="badge ' + (m.is_read ? 'badge-green' : 'badge-red') + '">' + (m.is_read ? 'Okundu' : 'Yeni') + '</span></td>';
          html += '<td style="text-align:right;">';
          if (!m.is_read) html += '<button class="btn btn-sm btn-primary" onclick="markRead(' + m.id + ', this)">👁️ Okundu</button> ';
          html += '<button class="btn btn-sm btn-danger" onclick="deleteMessage(' + m.id + ', this)">🗑️ Sil</button>';
          html += '</td></tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';
      }
    }

    loadMessages();
  </script>
</body>
</html>
