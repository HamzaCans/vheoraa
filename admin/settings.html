<!DOCTYPE html><html lang="tr"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Ayarlar | VHEORA Admin</title>  <link rel="stylesheet" href="admin.css?v=6">  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></head><body>  <aside class="sidebar" id="sidebar"></aside>  <main class="main-content">    <div class="page-header">      <div>        <h1 class="page-title">Ayarlar</h1>        <p class="page-subtitle">Bakım modu ve site ayarları.</p>      </div>    </div>    <div class="alert alert-success" id="successAlert" style="display:none;"></div>    <div class="alert alert-error" id="errorAlert" style="display:none;"></div>    <div class="settings-section">      <h3 class="section-heading">🛠 Bakım Modu</h3>      <p class="section-desc">Siteyi ziyaretçilere kapatıp "Yakında Hizmetinizdeyiz" sayfasına yönlendirir. Yönetici paneli ve API erişime açık kalır.</p>      <div class="maintenance-toggle-row">        <div class="toggle-wrap">          <label class="toggle-label">            <span class="toggle-text" id="maintenanceStatus">Bakım Modu Kapalı</span>            <input type="checkbox" id="maintenanceToggle">            <span class="toggle-slider"></span>          </label>        </div>      </div>      <div class="form-row" style="margin-top:20px;">        <div class="form-group">          <label for="maintenanceTitle">Başlık</label>          <input type="text" id="maintenanceTitle" placeholder="Yakında Hizmetinizdeyiz">        </div>        <div class="form-group">          <label for="maintenanceMessage">Mesaj</label>          <input type="text" id="maintenanceMessage" placeholder="Sizler için çalışıyoruz...">        </div>      </div>    </div>    <div class="settings-section">      <h3 class="section-heading">🌐 Site İçeriği</h3>      <p class="section-desc">Ana sayfada görünen dinamik metinleri yönetin. Boş bırakılan alanlar varsayılan metinleri kullanır.</p>      <div class="form-row">        <div class="form-group">          <label for="siteHeroTitle">Hero Başlık (HTML)</label>          <input type="text" id="siteHeroTitle" placeholder='<span class="line">Zamansız</span>...'>        </div>        <div class="form-group">          <label for="siteHeroDesc">Hero Açıklama</label>          <input type="text" id="siteHeroDesc" placeholder="Her bir parça, yüzyıllık kuyumculuk...">        </div>      </div>      <div class="form-row">        <div class="form-group">          <label for="siteBadgeText">Hero Rozet Metni</label>          <input type="text" id="siteBadgeText" placeholder="Yeni Koleksiyon 2026">        </div>        <div class="form-group">          <label for="siteAboutText1">Hakkımızda Metni 1</label>          <input type="text" id="siteAboutText1" placeholder="VHEORA, 25 yılı aşkın tecrübesiyle...">        </div>      </div>      <div class="form-row">        <div class="form-group">          <label for="siteAboutText2">Hakkımızda Metni 2</label>          <input type="text" id="siteAboutText2" placeholder="Antalya'dan dünyaya açılan yolculuğumuzda...">        </div>        <div class="form-group">          <label for="siteStatCountry">İstatistik - Ülke</label>          <input type="text" id="siteStatCountry" placeholder="45">        </div>      </div>      <div class="form-row">        <div class="form-group">          <label for="siteStatCustomer">İstatistik - Müşteri</label>          <input type="text" id="siteStatCustomer" placeholder="7589">        </div>        <div class="form-group">          <label for="siteStatCollection">İstatistik - Koleksiyon</label>          <input type="text" id="siteStatCollection" placeholder="250">        </div>      </div>      <div class="form-row">        <div class="form-group">          <label for="siteContactAddress">İletişim - Adres</label>          <input type="text" id="siteContactAddress" placeholder="Muratpaşa, Antalya, Türkiye">        </div>        <div class="form-group">          <label for="siteContactEmail">İletişim - E-Posta</label>          <input type="text" id="siteContactEmail" placeholder="vheora.co@gmail.com">        </div>      </div>      <div class="form-row">        <div class="form-group">          <label for="siteContactPhone">İletişim - Telefon</label>          <input type="text" id="siteContactPhone" placeholder="+90 (551) 020 7299">        </div>        <div class="form-group">          <label for="siteContactHours">İletişim - Çalışma Saatleri</label>          <input type="text" id="siteContactHours" placeholder="Pzt - Cmt: 10:00 - 20:00">        </div>      </div>    </div>        <div class="form-actions">      <button class="btn btn-primary" onclick="saveSettings()">Kaydet</button>    </div>  </main>  <script>    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';    function getToken() {      const t = localStorage.getItem('vheora_token');      if (!t) window.location.href = '/admin/';      return t;    }    function logout() {      localStorage.removeItem('vheora_token');      localStorage.removeItem('vheora_user');      window.location.href = '/admin/';    }    document.getElementById('sidebar').innerHTML = `      <div class="sidebar-logo">VHEORA</div>      <div class="sidebar-sub">Admin Panel</div>      <nav class="sidebar-nav">                <div class="sidebar-category">Genel</div>        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>                <div class="sidebar-category">İçerik Yönetimi</div>        <a href="/admin/products.html" class="sidebar-link">💎 Urunler</a>
        <a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a>        <a href="/admin/testimonials.html" class="sidebar-link">⭐ Yorumlar</a>                
        <div class="sidebar-category">Sipariş Yönetimi</div>
        <a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a>
        <div class="sidebar-category">İletişim</div>        <a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a>                <div class="sidebar-category">Sistem</div>        <a href="/admin/settings.html" class="sidebar-link active">🔧 Ayarlar</a>        <a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a>                <div style="flex:1"></div>        <a href="/" class="sidebar-link">🌐 Siteye Git</a>      <button class="sidebar-logout" onclick="logout()">🚪 Cikis Yap</button>    `;    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menuyu ac/kapat">☰</button>');    function toggleSidebar() {      document.body.classList.toggle('sidebar-open');    }    function closeSidebar() {      document.body.classList.remove('sidebar-open');    }    function showAlert(type, msg) {      const el = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');      el.textContent = msg;      el.style.display = 'block';      setTimeout(() => el.style.display = 'none', 4000);    }    
    async function btnAction(btn, label, verb, actionFn) {
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';
      try {
        await actionFn();
        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;
        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);
      } catch(e) {
        btn.innerHTML = '\u2717 Hata';
        btn.className += ' btn-error';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);
      }
    }
    async function loadSettings() {      const token = getToken();      try {        const res = await fetch(API + '/api/admin/settings', { headers: { 'Authorization': 'Bearer ' + token } });        const data = await res.json();        if (data.error) { showAlert('error', data.error); return; }        document.getElementById('maintenanceToggle').checked = data.maintenance_mode === '1';        document.getElementById('maintenanceStatus').textContent = data.maintenance_mode === '1' ? 'Bakım Modu Açık' : 'Bakım Modu Kapalı';        document.getElementById('maintenanceTitle').value = data.maintenance_title || 'Yakında Hizmetinizdeyiz';        document.getElementById('maintenanceMessage').value = data.maintenance_message || '';        document.getElementById('siteHeroTitle').value = data.site_hero_title || '';        document.getElementById('siteHeroDesc').value = data.site_hero_desc || '';        document.getElementById('siteBadgeText').value = data.site_badge_text || '';        document.getElementById('siteAboutText1').value = data.site_about_text_1 || '';        document.getElementById('siteAboutText2').value = data.site_about_text_2 || '';        document.getElementById('siteStatCountry').value = data.site_stat_country || '';        document.getElementById('siteStatCustomer').value = data.site_stat_customer || '';        document.getElementById('siteStatCollection').value = data.site_stat_collection || '';        document.getElementById('siteContactAddress').value = data.site_contact_address || '';        document.getElementById('siteContactEmail').value = data.site_contact_email || '';        document.getElementById('siteContactPhone').value = data.site_contact_phone || '';        document.getElementById('siteContactHours').value = data.site_contact_hours || '';                      } catch (err) {        showAlert('error', 'Ayarlar yüklenirken hata oluştu');      }    }    document.getElementById('maintenanceToggle').addEventListener('change', function() {      document.getElementById('maintenanceStatus').textContent = this.checked ? 'Bakım Modu Açık' : 'Bakım Modu Kapalı';    });    async function saveSettings() {      const token = getToken();      const btn = document.querySelector('.form-actions .btn');      btn.disabled = true;      btn.textContent = 'Kaydediliyor...';      try {        const res = await fetch(API + '/api/admin/settings', {          method: 'PUT',          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },          body: JSON.stringify({            maintenance_mode: document.getElementById('maintenanceToggle').checked ? '1' : '0',            maintenance_title: document.getElementById('maintenanceTitle').value,            maintenance_message: document.getElementById('maintenanceMessage').value,            site_hero_title: document.getElementById('siteHeroTitle').value,            site_hero_desc: document.getElementById('siteHeroDesc').value,            site_badge_text: document.getElementById('siteBadgeText').value,            site_about_text_1: document.getElementById('siteAboutText1').value,            site_about_text_2: document.getElementById('siteAboutText2').value,            site_stat_country: document.getElementById('siteStatCountry').value,            site_stat_customer: document.getElementById('siteStatCustomer').value,            site_stat_collection: document.getElementById('siteStatCollection').value,            site_contact_address: document.getElementById('siteContactAddress').value,            site_contact_email: document.getElementById('siteContactEmail').value,            site_contact_phone: document.getElementById('siteContactPhone').value,            site_contact_hours: document.getElementById('siteContactHours').value,                                  })        });        const data = await res.json();        if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }        showAlert('success', 'Ayarlar başarıyla kaydedildi');      } catch (err) {        showAlert('error', 'Kaydedilirken hata oluştu');      } finally {        btn.disabled = false;        btn.textContent = 'Kaydet';      }    }    loadSettings();  </script></body></html>
