<!DOCTYPE html><html lang="tr"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Çeviriler | VHEORA Admin</title>  <link rel="stylesheet" href="admin.css?v=6">  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></head><body>  <aside class="sidebar" id="sidebar"></aside>  <main class="main-content">    <div class="page-header">      <div>        <h1 class="page-title">Çeviriler</h1>        <p class="page-subtitle">Çok dilli site için çeviri anahtarlarını yönetin.</p>      </div>      <div class="action-bar">        <input type="text" class="search-input" id="searchInput" placeholder="Anahtar ile ara..." oninput="filterTable()">        <button class="btn btn-primary btn-sm" onclick="openAddTranslation()">+ Yeni</button>        <button class="btn btn-primary btn-sm" onclick="saveAllTranslations()">💾 Toplu Kaydet</button>      </div>    </div>    <div class="alert alert-success" id="successAlert" style="display:none;"></div>    <div class="alert alert-error" id="errorAlert" style="display:none;"></div>    <div class="lang-tabs" id="langTabs"></div>    <div class="table-container" id="translationsContainer">      <p class="empty-state">Yükleniyor...</p>    </div>  </main>  <div class="modal-overlay" id="addModal">    <div class="modal">      <h2 class="modal-title">Yeni Çeviri Ekle</h2>      <div class="form-group">        <label>Dil</label>        <select id="newLangCode"></select>      </div>      <div class="form-group">        <label>Anahtar (Key)</label>        <input type="text" id="newKey" placeholder="ör: hero.title">      </div>      <div class="form-group">        <label>Çeviri</label>        <textarea id="newValue" placeholder="Çeviri metni"></textarea>      </div>      <div class="form-actions">        <button class="btn" onclick="closeAddModal()" style="background:transparent;color:var(--text-muted);border:1px solid var(--border);">İptal</button>        <button class="btn btn-primary" onclick="saveNewTranslation()">Ekle</button>      </div>    </div>  </div>  <script>    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';    let currentLang = '';    let allTranslations = [];    let allLanguages = [];    function getToken() {      const t = localStorage.getItem('vheora_token');      if (!t) window.location.href = '/admin/';      return t;    }    function logout() {      localStorage.removeItem('vheora_token');      localStorage.removeItem('vheora_user');      window.location.href = '/admin/';    }    document.getElementById('sidebar').innerHTML = `      <div class="sidebar-logo">VHEORA</div>      <div class="sidebar-sub">Admin Panel</div>      <nav class="sidebar-nav">                <div class="sidebar-category">Genel</div>        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>                <div class="sidebar-category">İçerik Yönetimi</div>        <a href="/admin/products.html" class="sidebar-link">💎 Urunler</a>
        <a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a>        <a href="/admin/testimonials.html" class="sidebar-link">⭐ Yorumlar</a>                
        <div class="sidebar-category">Sipariş Yönetimi</div>
        <a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a>
        <div class="sidebar-category">İletişim</div>        <a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a>                <div class="sidebar-category">Sistem</div>        <a href="/admin/settings.html" class="sidebar-link">🔧 Ayarlar</a>        <a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a>                <div style="flex:1"></div>        <a href="/" class="sidebar-link">🌐 Siteye Git</a>      <button class="sidebar-logout" onclick="logout()">🚪 Cikis Yap</button>    `;    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menuyu ac/kapat">☰</button>');    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }    function closeSidebar() { document.body.classList.remove('sidebar-open'); }    function showAlert(type, msg) {      const el = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');      el.textContent = msg;      el.style.display = 'block';      setTimeout(() => el.style.display = 'none', 4000);    }    
    async function btnAction(btn, label, verb, actionFn) {
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';
      try {
        await actionFn();
        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;
        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);
      } catch(e) {
        btn.innerHTML = '\u2717 Hata';
        btn.className += ' btn-error';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);
      }
    }
    async function loadLanguages() {      try {        const res = await fetch(API + '/api/admin/languages', { headers: { 'Authorization': 'Bearer ' + getToken() } });        allLanguages = await res.json();        if (!Array.isArray(allLanguages)) allLanguages = [];        renderLangTabs();        populateLangSelects();      } catch (err) {        showAlert('error', 'Diller yüklenemedi');      }    }    function renderLangTabs() {      const container = document.getElementById('langTabs');      if (!allLanguages.length) {        container.innerHTML = '<p style="color:var(--text-muted);padding:12px 0;">Önce bir dil ekleyin.</p>';        return;      }      container.innerHTML = allLanguages.map(l => `        <button class="lang-tab ${l.code === currentLang || (!currentLang && l.is_default) ? 'active' : ''}"                data-lang="${l.code}" onclick="switchLang('${l.code}')">          ${l.flag || '🌐'} ${l.name}        </button>      `).join('');      if (!currentLang) {        const def = allLanguages.find(l => l.is_default);        currentLang = def ? def.code : allLanguages[0].code;      }      loadTranslations();    }    function switchLang(code) {      currentLang = code;      document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === code));      loadTranslations();    }    function populateLangSelects() {      const sel = document.getElementById('newLangCode');      sel.innerHTML = allLanguages.map(l => `<option value="${l.code}">${l.flag || '🌐'} ${l.name}</option>`).join('');    }    function filterTable() {      const q = document.getElementById('searchInput').value.toLowerCase();      const rows = document.querySelectorAll('#translationsBody tr');      rows.forEach(row => {        const key = row.querySelector('.trans-key')?.textContent?.toLowerCase() || '';        row.style.display = key.includes(q) ? '' : 'none';      });    }    async function loadTranslations() {      const container = document.getElementById('translationsContainer');      if (!currentLang) {        container.innerHTML = '<p class="empty-state">Lütfen bir dil seçin.</p>';        return;      }      try {        const res = await fetch(API + '/api/admin/translations?lang=' + currentLang, {          headers: { 'Authorization': 'Bearer ' + getToken() }        });        allTranslations = await res.json();        if (!Array.isArray(allTranslations)) allTranslations = [];        renderTable();      } catch (err) {        container.innerHTML = '<p class="empty-state">Yüklenemedi</p>';      }    }    function renderTable() {      const container = document.getElementById('translationsContainer');      if (!allTranslations.length) {        container.innerHTML = '<p class="empty-state">Henüz çeviri yok. "Yeni" butonu ile ekleyin.</p>';        return;      }      container.innerHTML = `        <table>          <thead>            <tr>              <th style="width:35%;">Anahtar (Key)</th>              <th style="width:50%;">Çeviri (Value)</th>              <th style="width:15%;">İşlem</th>            </tr>          </thead>          <tbody id="translationsBody">            ${allTranslations.map(t => `              <tr data-id="${t.id}">                <td><code class="trans-key" style="background:rgba(212,168,83,0.1);padding:2px 8px;border-radius:4px;font-size:0.8rem;">${t.key}</code></td>                <td>                  <input type="text" class="trans-value-input" value="${(t.value || '').replace(/"/g, '&quot;')}"                         data-id="${t.id}" data-lang="${t.lang_code}" data-key="${t.key}"                         style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:0.85rem;font-family:var(--font);">                </td>                <td>                  <button class="btn btn-danger btn-sm" onclick="deleteTranslation(${t.id})">Sil</button>                </td>              </tr>            `).join('')}          </tbody>        </table>      `;    }    function openAddTranslation() {      document.getElementById('newKey').value = '';      document.getElementById('newValue').value = '';      document.getElementById('addModal').classList.add('active');    }    function closeAddModal() {      document.getElementById('addModal').classList.remove('active');    }    document.getElementById('addModal').addEventListener('click', function(e) {      if (e.target === this) closeAddModal();    });    async function saveNewTranslation() {
      var lang_code = document.getElementById('newLangCode').value;
      var key = document.getElementById('newKey').value.trim();
      var value = document.getElementById('newValue').value.trim();
      if (!key) { showAlert('error', 'Anahtar gerekli'); return; }
      var btn = document.querySelector('#addModal .btn-primary');
      await btnAction(btn, 'Ekleniyor', 'Eklendi', async function() {
        var res = await fetch(API + '/api/admin/translations', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ lang_code: lang_code, key: key, value: value })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Hata');
        closeAddModal(); switchLang(lang_code);
      });
    }      try {        const res = await fetch(API + '/api/admin/translations', {          method: 'POST',          headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },          body: JSON.stringify({ lang_code, key, value })        });        const data = await res.json();        if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }        showAlert('success', 'Çeviri eklendi');        closeAddModal();        switchLang(lang_code);      } catch (err) {        showAlert('error', 'Eklenirken hata oluştu');      }    }    async function saveAllTranslations() {
      var inputs = document.querySelectorAll('.trans-value-input');
      var updates = [];
      inputs.forEach(function(inp) { updates.push({ lang_code: inp.dataset.lang, key: inp.dataset.key, value: inp.value }); });
      if (!updates.length) return;
      var btn = document.querySelector('.action-bar .btn-primary:last-child');
      await btnAction(btn, 'Kaydediliyor', 'Kaydedildi', async function() {
        var res = await fetch(API + '/api/admin/translations', {
          method: 'PUT', headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
          body: JSON.stringify(updates)
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Hata');
      });
    });      });      if (!updates.length) return;      try {        const res = await fetch(API + '/api/admin/translations', {          method: 'PUT',          headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },          body: JSON.stringify(updates)        });        const data = await res.json();        if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }        showAlert('success', updates.length + ' çeviri kaydedildi');      } catch (err) {        showAlert('error', 'Kaydedilirken hata oluştu');      }    }    async function deleteTranslation(id) {      if (!confirm('Bu çeviriyi sil?')) return;      try {        const res = await fetch(API + '/api/admin/translations/' + id, {          method: 'DELETE',          headers: { 'Authorization': 'Bearer ' + getToken() }        });        const data = await res.json();        if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }        showAlert('success', 'Çeviri silindi');        loadTranslations();      } catch (err) {        showAlert('error', 'Silinirken hata oluştu');      }    }    loadLanguages();  </script></body></html>
