<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VHEORA | ADMIN</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css?v=7">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Loglar</h1>
        <p class="page-subtitle">Admin işlem ve ziyaretçi kayıtları.</p>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary btn-sm" onclick="refreshLogs()">🔄 Yenile</button>
        <button class="btn btn-danger btn-sm" onclick="resetAdminLogs()">🗑️ Logları Sıfırla</button>
        <button class="btn btn-danger btn-sm" onclick="resetVisitorLogs()">🗑️ Ziyaretçileri Sıfırla</button>
      </div>
    </div>
    <div class="tabs" id="logTabs">
      <button class="tab-btn active" data-tab="admin" onclick="switchTab('admin')">📋 Admin İşlemleri</button>
      <button class="tab-btn" data-tab="visitor" onclick="switchTab('visitor')">👁️ Ziyaretçi Kayıtları</button>
    </div>
    <div class="logs-section" id="adminLogsSection">
      <div class="log-filters">
        <button class="log-filter-btn active" data-action="all" onclick="filterAdminLogs('all', this)">Tümü</button>
        <button class="log-filter-btn" data-action="login" onclick="filterAdminLogs('login', this)">🔑 Giriş</button>
        <button class="log-filter-btn" data-action="logout" onclick="filterAdminLogs('logout', this)">🚪 Çıkış</button>
        <button class="log-filter-btn" data-action="delete" onclick="filterAdminLogs('delete', this)">🗑️ Silme</button>
        <button class="log-filter-btn" data-action="approve" onclick="filterAdminLogs('approve', this)">✅ Onay</button>
        <button class="log-filter-btn" data-action="page_visit" onclick="filterAdminLogs('page_visit', this)">👁️ Sayfa</button>
      </div>
      <div class="log-table-wrap">
        <table id="adminLogTable">
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Saat</th>
              <th>Kullanıcı</th>
              <th>İşlem</th>
              <th>IP Adresi</th>
              <th>Konum</th>
              <th>Cihaz Türü</th>
              <th>Tarayıcı</th>
              <th>İşletim Sistemi</th>
              <th>Model</th>
            </tr>
          </thead>
          <tbody id="adminLogBody"></tbody>
        </table>
      </div>
    </div>
    <div class="logs-section" id="visitorLogsSection" style="display:none">
      <div class="log-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Saat</th>
              <th>Sayfa</th>
              <th>IP Adresi</th>
              <th>Konum</th>
              <th>Cihaz Türü</th>
              <th>Tarayıcı</th>
              <th>İşletim Sistemi</th>
              <th>Cihaz Modeli</th>
            </tr>
          </thead>
          <tbody id="visitorLogBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">Emin misiniz?</h3>
      <p id="confirmText">Bu işlem geri alınamaz.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>
        <button class="btn btn-danger" id="confirmBtn">Sil</button>
      </div>
    </div>
  </div>
  <div id="adminToast" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <script src="shared-functions.js"></script>
  <script>
    initSidebar('logs');
    var token = getToken();
    var currentTab = 'admin';
    var adminLogs = [];

    function formatDate(d) {
      var s = String(d).trim();
      if (!/Z$|[+-]\d{2}:\d{2}$/.test(s)) s += 'Z';
      var date = new Date(s);
      var now = new Date();
      var diff = now - date;
      if (diff < 60000) return 'Az \u00F6nce';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' dk \u00F6nce';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' saat \u00F6nce';
      return date.toLocaleDateString('tr-TR', { timeZone: userTimezone, day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatDateOnly(d) {
      var s = String(d).trim();
      if (!/Z$|[+-]\d{2}:\d{2}$/.test(s)) s += 'Z';
      var date = new Date(s);
      return date.toLocaleDateString('tr-TR', { timeZone: userTimezone, day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function formatTimeOnly(d) {
      var s = String(d).trim();
      if (!/Z$|[+-]\d{2}:\d{2}$/.test(s)) s += 'Z';
      var date = new Date(s);
      return date.toLocaleTimeString('tr-TR', { timeZone: userTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function formatAction(action) {
      var map = {
        login: '\uD83D\uDD11 Giri\u015F',
        logout: '\uD83D\uDEAA \u00C7\u0131k\u0131\u015F',
        delete_message: '\uD83D\uDDD1\uFE0F Mesaj Silme',
        delete_testimonial: '\uD83D\uDDD1\uFE0F Yorum Silme',
        approve_testimonial: '\u2705 Yorum Onay',
        delete_product: '\uD83D\uDDD1\uFE0F \u00DCr\u00FCn Silme',
        update_product: '\uD83D\uDCDD \u00DCr\u00FCn D\u00FCzenleme',
        create_product: '\u2795 \u00DCr\u00FCn Ekleme',
        read_message: '\uD83D\uDCE9 Mesaj Okundu',
        create_order: '\u2795 Sipari\u015F Olu\u015Fturma',
        update_order_status: '\uD83D\uDEE1\uFE0F Sipari\u015F Durumu',
        stock_adjustment: '\uD83D\uDCE6 Stok D\u00FCzenleme',
        page_visit: '\uD83D\uDC41\uFE0F Sayfa Ziyareti'
      };
      if (!action) return '? Bilinmeyen';
      var key = action.split(':')[0].trim();
      return (map[key] || '? ' + key) + (action.includes(':') ? ' - ' + action.split(':').slice(1).join(':').trim() : '');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
      document.getElementById('adminLogsSection').style.display = tab === 'admin' ? '' : 'none';
      document.getElementById('visitorLogsSection').style.display = tab === 'visitor' ? '' : 'none';
    }

    function filterAdminLogs(action, btn) {
      document.querySelectorAll('.log-filter-btn').forEach(function(b) { b.classList.remove('active'); });
      if (btn) btn.classList.add('active');
      renderAdminLogs(action);
    }

    function renderAdminLogs(filter) {
      var body = document.getElementById('adminLogBody');
      var filtered = adminLogs;
      if (filter && filter !== 'all') {
        filtered = adminLogs.filter(function(l) { return l.action && l.action.toLowerCase().indexOf(filter) !== -1; });
      }
      if (!filtered.length) {
        body.innerHTML = '<tr><td colspan="10" class="empty-state"><p>Hen\u00FCz log kayd\u0131 yok.</p></td></tr>';
        return;
      }
      body.innerHTML = filtered.map(function(l) {
        var loc = [l.country, l.city].filter(Boolean).join(', ') || '-';
        var ref = l.referrer ? l.referrer.replace(/https?:\/\//,'').split('/')[0] : '-';
        return '<tr>' +
          '<td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted)">' + formatDateOnly(l.created_at) + '</td>' +
          '<td style="white-space:nowrap;font-size:0.82rem;font-family:JetBrains Mono,monospace;color:var(--text-muted)">' + formatTimeOnly(l.created_at) + '</td>' +
          '<td><span class="badge badge-gold">' + (l.username || '-') + '</span></td>' +
          '<td>' + formatAction(l.action) + '</td>' +
          '<td><span class="ip-address">' + (l.ip_address || '-') + '</span></td>' +
          '<td style="font-size:0.82rem;color:var(--text-muted)">' + loc + '</td>' +
          '<td><span class="device-chip">' + (l.device_type || '-') + '</span></td>' +
          '<td><span class="device-chip">' + (l.browser || '-') + '</span></td>' +
          '<td><span class="device-chip">' + (l.os || '-') + '</span></td>' +
          '<td><span class="device-chip">' + (l.device_model || '-') + '</span></td>' +
          '</tr>';
      }).join('');
    }

    async function loadAdminLogs() {
      document.getElementById('adminLogBody').innerHTML = '<tr><td colspan="10" class="loading-spinner">Y\u00FCkleniyor</td></tr>';
      try {
        var logs = await fetchJSON(API + '/api/admin/logs?limit=200', { headers: { 'Authorization': 'Bearer ' + token } });
        if (logs == null) return;
        adminLogs = logs;
        renderAdminLogs('all');
      } catch (err) {
        document.getElementById('adminLogBody').innerHTML = '<tr><td colspan="10" class="empty-state"><p>Loglar y\u00FCklenemedi.</p></td></tr>';
      }
    }

    async function loadVisitorLogs() {
      document.getElementById('visitorLogBody').innerHTML = '<tr><td colspan="10" class="loading-spinner">Y\u00FCkleniyor</td></tr>';
      try {
        var logs = await fetchJSON(API + '/api/admin/visitor-logs?limit=200', { headers: { 'Authorization': 'Bearer ' + token } });
        if (logs == null) return;
        var body = document.getElementById('visitorLogBody');
        if (!logs.length) {
          body.innerHTML = '<tr><td colspan="10" class="empty-state"><p>Hen\u00FCz ziyaret\u00E7i kayd\u0131 yok.</p></td></tr>';
          return;
        }
        body.innerHTML = logs.map(function(l) {
          var loc = [l.country, l.city].filter(Boolean).join(', ') || '-';
          return '<tr>' +
            '<td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted)">' + formatDateOnly(l.created_at) + '</td>' +
            '<td style="white-space:nowrap;font-size:0.82rem;font-family:JetBrains Mono,monospace;color:var(--text-muted)">' + formatTimeOnly(l.created_at) + '</td>' +
            '<td><span class="badge badge-gold">' + (l.page_visited || '-') + '</span></td>' +
            '<td><span class="ip-address">' + (l.ip_address || '-') + '</span></td>' +
            '<td style="font-size:0.82rem;color:var(--text-muted)">' + loc + '</td>' +
            '<td><span class="device-chip">' + (l.device_type || '-') + '</span></td>' +
            '<td><span class="device-chip">' + (l.browser || '-') + '</span></td>' +
            '<td><span class="device-chip">' + (l.os || '-') + '</span></td>' +
            '<td><span class="device-chip">' + (l.device_model || '-') + '</span></td>' +
            '</tr>';
        }).join('');
      } catch (err) {
        document.getElementById('visitorLogBody').innerHTML = '<tr><td colspan="10" class="empty-state"><p>Y\u00FCklenemedi.</p></td></tr>';
      }
    }

    function refreshLogs() {
      loadAdminLogs();
      loadVisitorLogs();
    }

    async function resetAdminLogs() {
      var confirmed = await showConfirm('Loglar\u0131 S\u0131f\u0131rla', 'T\u00FCm admin i\u015Flem loglar\u0131 kal\u0131c\u0131 olarak silinecek. Bu i\u015Flem geri al\u0131namaz.', 'S\u0131f\u0131rla');
      if (!confirmed) return;
      try {
        var res = await fetch(API + '/api/admin/logs', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Hata');
        adminLogs = [];
        renderAdminLogs('all');
        adminToast('S\u0131f\u0131rland\u0131', 'Admin loglar\u0131 ba\u015Far\u0131yla silindi.', 'success');
      } catch (err) {
        adminToast('Hata', err.message || 'Loglar silinemedi.', 'error');
      }
    }

    async function resetVisitorLogs() {
      var confirmed = await showConfirm('Ziyaret\u00E7i Kay\u0131tlar\u0131n\u0131 S\u0131f\u0131rla', 'T\u00FCm ziyaret\u00E7i kay\u0131tlar\u0131 kal\u0131c\u0131 olarak silinecek. Bu i\u015Flem geri al\u0131namaz.', 'S\u0131f\u0131rla');
      if (!confirmed) return;
      try {
        var res = await fetch(API + '/api/admin/visitor-logs', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Hata');
        document.getElementById('visitorLogBody').innerHTML = '<tr><td colspan="10" class="empty-state"><p>Hen\u00FCz ziyaret\u00E7i kayd\u0131 yok.</p></td></tr>';
        adminToast('S\u0131f\u0131rland\u0131', 'Ziyaret\u00E7i kay\u0131tlar\u0131 ba\u015Far\u0131yla silindi.', 'success');
      } catch (err) {
        adminToast('Hata', err.message || 'Kay\u0131tlar silinemedi.', 'error');
      }
    }

    async function init() {
      await loadTimezone();
      loadAdminLogs();
      loadVisitorLogs();
    }
    init();
  </script>
</body>
</html>
