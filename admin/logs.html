<!DOCTYPE html><html lang="tr"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Loglar | VHEORA Admin</title>  <link rel="preconnect" href="https://fonts.googleapis.com">  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">  <link rel="stylesheet" href="admin.css?v=6"></head><body>  <aside class="sidebar" id="sidebar"></aside>  <div class="main-content">    <div class="page-header">      <div>        <h1 class="page-title">Loglar</h1>        <p class="page-subtitle">Admin işlem ve ziyaretçi kayıtları.</p>      </div>      <div class="action-bar">        <button class="btn btn-primary btn-sm" onclick="refreshLogs()">🔄 Yenile</button>      </div>    </div>    <div class="tabs" id="logTabs">      <button class="tab-btn active" data-tab="admin">🛡️ Admin İşlemleri</button>      <button class="tab-btn" data-tab="visitor">👤 Ziyaretçi Kayıtları</button>    </div>    <div class="logs-section" id="adminLogsSection">      <div class="log-filters">        <button class="log-filter-btn active" data-action="all">Tümü</button>        <button class="log-filter-btn" data-action="login">🔑 Giriş</button>        <button class="log-filter-btn" data-action="logout">🚪 Çıkış</button>        <button class="log-filter-btn" data-action="delete">🗑️ Silme</button>        <button class="log-filter-btn" data-action="approve">✅ Onay</button>      </div>      <div class="log-table-wrap">        <table id="adminLogTable">          <thead>            <tr>              <th>Tarih</th>              <th>Kullanıcı</th>              <th>İşlem</th>              <th>IP Adresi</th>              <th>Cihaz</th>            </tr>          </thead>          <tbody id="adminLogBody"></tbody>        </table>      </div>    </div>    <div class="logs-section" id="visitorLogsSection" style="display:none">      <div class="log-table-wrap">        <table>          <thead>            <tr>              <th>Tarih</th>              <th>Sayfa</th>              <th>IP Adresi</th>              <th>Cihaz</th>              <th>Referrer</th>            </tr>          </thead>          <tbody id="visitorLogBody"></tbody>        </table>      </div>    </div>  </div>  <script>    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';    function getToken() {      const t = localStorage.getItem('vheora_token');      if (!t) window.location.href = '/admin/';      return t;    }    function logout() {      localStorage.removeItem('vheora_token');      window.location.href = '/admin/';    }    document.getElementById('sidebar').innerHTML = `      <div class="sidebar-logo">VHEORA</div>      <div class="sidebar-sub">Admin Panel</div>      <nav class="sidebar-nav">                <div class="sidebar-category">Genel</div>        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>                <div class="sidebar-category">İçerik Yönetimi</div>        <a href="/admin/products.html" class="sidebar-link">💎 Ürünler</a>
        <a href="/admin/inventory.html" class="sidebar-link">📦 Stok</a>        <a href="/admin/testimonials.html" class="sidebar-link">⭐ Yorumlar</a>                
        <div class="sidebar-category">Sipariş Yönetimi</div>
        <a href="/admin/orders.html" class="sidebar-link">📦 Siparişler</a>
        <div class="sidebar-category">İletişim</div>        <a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a>                <div class="sidebar-category">Sistem</div>        <a href="/admin/settings.html" class="sidebar-link">🔧 Ayarlar</a>        <a href="/admin/logs.html" class="sidebar-link active">📋 Loglar</a>                <div style="flex:1"></div>        <a href="/" class="sidebar-link">🌐 Siteye Git</a>      <button class="sidebar-logout" onclick="logout()">🚪 Çıkış Yap</button>    `;    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menuyu ac/kapat">☰</button>');    function toggleSidebar() {      document.body.classList.toggle('sidebar-open');    }    function closeSidebar() {      document.body.classList.remove('sidebar-open');    }    const token = getToken();    let currentTab = 'admin';    let adminLogs = [];    function formatDate(d) {      const date = new Date(d + 'Z');      const now = new Date();      const diff = now - date;      if (diff < 60000) return 'Az önce';      if (diff < 3600000) return Math.floor(diff / 60000) + ' dk önce';      if (diff < 86400000) return Math.floor(diff / 3600000) + ' saat önce';      return date.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });    }    function formatAction(action) {      const map = {        login: '🔑 Giriş',        logout: '🚪 Çıkış',        delete_message: '🗑️ Mesaj Silme',        delete_testimonial: '🗑️ Yorum Silme',        approve_testimonial: '✅ Yorum Onay',        delete_product: '🗑️ Ürün Silme',        update_product: '✏️ Ürün Düzenleme',        create_product: '➕ Ürün Ekleme',        read_message: '📩 Mesaj Okundu'      };      return map[action] || action;    }    function renderAdminLogs(filter = 'all') {      const body = document.getElementById('adminLogBody');      const filtered = filter === 'all' ? adminLogs : adminLogs.filter(l => l.action === filter);      if (!filtered.length) {        body.innerHTML = '<tr><td colspan="5" class="empty-state"><p>Kayıt bulunamadı.</p></td></tr>';        return;      }      body.innerHTML = filtered.map(l => `        <tr>          <td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted)">${formatDate(l.created_at)}</td>          <td><strong>${l.username}</strong></td>          <td>${formatAction(l.action)}</td>          <td><span class="ip-address">${l.ip_address || '-'}</span></td>          <td><span class="device-chip">${l.device_info || '-'}</span></td>        </tr>      `).join('');    }    
    async function btnAction(btn, label, verb, actionFn) {
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';
      try {
        await actionFn();
        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;
        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);
      } catch(e) {
        btn.innerHTML = '\u2717 Hata';
        btn.className += ' btn-error';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);
      }
    }
    async function loadAdminLogs() {      document.getElementById('adminLogBody').innerHTML = '<tr><td colspan="5" class="loading-spinner">Yükleniyor</td></tr>';      try {        const res = await fetch(`${API}/api/admin/logs?limit=200`, { headers: { 'Authorization': 'Bearer ' + token } });        adminLogs = await res.json();        renderAdminLogs('all');      } catch (err) {        document.getElementById('adminLogBody').innerHTML = '<tr><td colspan="5" class="empty-state"><p>Loglar yüklenemedi.</p></td></tr>';      }    }    async function loadVisitorLogs() {      document.getElementById('visitorLogBody').innerHTML = '<tr><td colspan="5" class="loading-spinner">Yükleniyor</td></tr>';      try {        const res = await fetch(`${API}/api/admin/visitor-logs?limit=200`, { headers: { 'Authorization': 'Bearer ' + token } });        const logs = await res.json();        const body = document.getElementById('visitorLogBody');        if (!logs.length) {          body.innerHTML = '<tr><td colspan="5" class="empty-state"><p>Henüz ziyaretçi kaydı yok.</p></td></tr>';          return;        }        body.innerHTML = logs.map(l => `          <tr>            <td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted)">${formatDate(l.created_at)}</td>            <td><span class="badge badge-gold">${l.page_visited || '-'}</span></td>            <td><span class="ip-address">${l.ip_address || '-'}</span></td>            <td><span class="device-chip">${l.device_info || '-'}</span></td>            <td style="font-size:0.8rem;color:var(--text-muted)">${l.referrer ? l.referrer.replace(/https?:\/\//,'').split('/')[0] : '-'}</td>          </tr>        `).join('');      } catch (err) {        document.getElementById('visitorLogBody').innerHTML = '<tr><td colspan="5" class="empty-state"><p>Ziyaretçi logları yüklenemedi.</p></td></tr>';      }    }    function refreshLogs() {      if (currentTab === 'admin') loadAdminLogs();      else loadVisitorLogs();    }    // Tab switching    document.querySelectorAll('#logTabs .tab-btn').forEach(btn => {      btn.addEventListener('click', () => {        document.querySelectorAll('#logTabs .tab-btn').forEach(b => b.classList.remove('active'));        btn.classList.add('active');        currentTab = btn.dataset.tab;        document.getElementById('adminLogsSection').style.display = currentTab === 'admin' ? 'block' : 'none';        document.getElementById('visitorLogsSection').style.display = currentTab === 'visitor' ? 'block' : 'none';        if (currentTab === 'admin' && !adminLogs.length) loadAdminLogs();        if (currentTab === 'visitor') loadVisitorLogs();      });    });    // Filter buttons    document.querySelectorAll('.log-filter-btn').forEach(btn => {      btn.addEventListener('click', () => {        document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));        btn.classList.add('active');        renderAdminLogs(btn.dataset.action);      });    });    loadAdminLogs();  </script></body></html>
