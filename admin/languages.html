<!DOCTYPE html><html lang="tr"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  <title>VHEORA | ADMIN</title>  <link rel="icon" type="image/png" href="../favicon.png">  <link rel="stylesheet" href="admin.css?v=7">  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></head><body>  <aside class="sidebar" id="sidebar"></aside>  <main class="main-content">    <div class="page-header">      <div>        <h1 class="page-title">Diller</h1>        <p class="page-subtitle">Site dillerini yönetin. Varsayılan dil silinemez.</p>      </div>      <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Yeni Dil</button>    </div>    <div class="alert alert-success" id="successAlert" style="display:none;"></div>    <div class="alert alert-error" id="errorAlert" style="display:none;"></div>    <div class="table-container">      <table>        <thead>          <tr>            <th>ID</th>            <th>Kod</th>            <th>Ad</th>            <th>Bayrak</th>            <th>Varsayılan</th>            <th>Aktif</th>            <th>İşlem</th>          </tr>        </thead>        <tbody id="langTableBody">          <tr><td colspan="7" class="empty-state">Yükleniyor...</td></tr>        </tbody>      </table>    </div>  </main>  <div class="modal-overlay" id="langModal">    <div class="modal">      <h2 class="modal-title" id="modalTitle">Yeni Dil Ekle</h2>      <div class="form-group">        <label>Dil Kodu</label>        <input type="text" id="langCode" placeholder="ör: es" maxlength="10">      </div>      <div class="form-group">        <label>Dil Adı</label>        <input type="text" id="langName" placeholder="ör: Español">      </div>      <div class="form-group">        <label>Bayrak Emojisi</label>        <input type="text" id="langFlag" placeholder="????">      </div>      <div class="form-row">        <div class="form-group" style="display:flex;align-items:center;gap:12px;">          <label style="margin:0;">Varsayılan Yap</label>          <input type="checkbox" id="langDefault" style="width:auto;">        </div>        <div class="form-group" style="display:flex;align-items:center;gap:12px;">          <label style="margin:0;">Aktif</label>          <input type="checkbox" id="langActive" checked style="width:auto;">        </div>      </div>      <div class="form-actions">        <button class="btn" onclick="closeModal()" style="background:transparent;color:var(--text-muted);border:1px solid var(--border);">İptal</button>        <button class="btn btn-primary" id="saveLangBtn" onclick="saveLanguage()">Kaydet</button>      </div>    </div>  </div>  <script>    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';    let editingLangId = null;    function getToken() {      const t = localStorage.getItem('vheora_token');      if (!t) window.location.href = '/admin/';      return t;    }    async function logout() { try { await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+localStorage.getItem('vheora_token')}}); } catch(e) {} localStorage.removeItem('vheora_token'); localStorage.removeItem('vheora_user'); window.location.href = '/admin/'; }    document.getElementById('sidebar').innerHTML = '      <div class="sidebar-logo">VHEORA</div>\n            <div class="sidebar-sub">Admin Panel</div>\n            <nav class="sidebar-nav">\n              <div class="sidebar-category">Genel</div>\n              <a href="/admin/dashboard.html" class="sidebar-link">\uD83D\uDCCA Dashboard</a>\n              <div class="sidebar-category">İçerik Yönetimi</div>\n              <a href="/admin/products.html" class="sidebar-link">\uD83D\uDC8E \u00DCr\u00FCnler</a>\n              <a href="/admin/inventory.html" class="sidebar-link">\uD83D\uDCE6 Stok</a>\n              <a href="/admin/testimonials.html" class="sidebar-link">\u2B50 Yorumlar</a>\n              <div class="sidebar-category">Sipariş Yönetimi</div>\n              <a href="/admin/orders.html" class="sidebar-link">\uD83D\uDCE6 Sipari\u015Fler</a>\n              <div class="sidebar-category">İletişim</div>\n              <a href="/admin/messages.html" class="sidebar-link">\u2709\uFE0F Mesajlar</a>\n              <div class="sidebar-category">Sistem</div>\n              <a href="/admin/settings.html" class="sidebar-link">\u2699\uFE0F Ayarlar</a>\n              <a href="/admin/logs.html" class="sidebar-link">\uD83D\uDCCB Loglar</a>\n              <div style="flex:1"></div>\n              <a href="/" class="sidebar-link">\uD83C\uDF10 Siteye Git</a>\n            </nav>\n            <button class="sidebar-logout" onclick="logout()">\uD83D\uDEAA \u00C7\u0131k\u0131\u015F Yap</button>';    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Men\u00FCy\u00FC a\u00E7/kapat">\u2630</button>');    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }    function closeSidebar() { document.body.classList.remove('sidebar-open'); }    function showAlert(type, msg) {      const el = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');      el.textContent = msg;      el.style.display = 'block';      setTimeout(() => el.style.display = 'none', 4000);    }    function openAddModal() {      editingLangId = null;      document.getElementById('modalTitle').textContent = 'Yeni Dil Ekle';      document.getElementById('saveLangBtn').textContent = 'Ekle';      document.getElementById('langCode').value = '';      document.getElementById('langName').value = '';      document.getElementById('langFlag').value = '';      document.getElementById('langDefault').checked = false;      document.getElementById('langActive').checked = true;      document.getElementById('langCode').disabled = false;      document.getElementById('langModal').classList.add('active');    }    function openEditModal(lang) {      editingLangId = lang.id;      document.getElementById('modalTitle').textContent = 'Dili Düzenle';      document.getElementById('saveLangBtn').textContent = 'Kaydet';      document.getElementById('langCode').value = lang.code;      document.getElementById('langName').value = lang.name;      document.getElementById('langFlag').value = lang.flag || '';      document.getElementById('langDefault').checked = lang.is_default === 1;      document.getElementById('langActive').checked = lang.is_active === 1;      document.getElementById('langCode').disabled = true;      document.getElementById('langModal').classList.add('active');    }    function closeModal() {      document.getElementById('langModal').classList.remove('active');    }    document.getElementById('langModal').addEventListener('click', function(e) {      if (e.target === this) closeModal();    });    async function saveLanguage() {      const code = document.getElementById('langCode').value.trim();      const name = document.getElementById('langName').value.trim();      const flag = document.getElementById('langFlag').value.trim();      const isDefault = document.getElementById('langDefault').checked;      const isActive = document.getElementById('langActive').checked;      if (!code || !name) { showAlert('error', 'Dil kodu ve adı gerekli'); return; }      const token = getToken();      const btn = document.getElementById('saveLangBtn');      btn.disabled = true;      btn.textContent = 'Kaydediliyor...';      try {        if (editingLangId) {          const res = await fetch(API + '/api/admin/languages/' + editingLangId, {            method: 'PUT',            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },            body: JSON.stringify({ name, flag, is_default: isDefault, is_active: isActive })          });          const data = await res.json();          if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }          showAlert('success', 'Dil güncellendi');        } else {          const res = await fetch(API + '/api/admin/languages', {            method: 'POST',            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },            body: JSON.stringify({ code, name, flag, is_default: isDefault, is_active: isActive })          });          const data = await res.json();          if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }          showAlert('success', 'Dil eklendi');        }        closeModal();        loadLanguages();      } catch (err) {        showAlert('error', 'İşlem sırasında hata oluştu');      } finally {        btn.disabled = false;        btn.textContent = editingLangId ? 'Kaydet' : 'Ekle';      }    }    async function deleteLanguage(id) {      if (!await showConfirm("Dili Sil", "Bu dil kalıcı olarak silinecek. Dile ait tüm çeviriler de silinecektir.")) return;      const token = getToken();      try {        const res = await fetch(API + '/api/admin/languages/' + id, {          method: 'DELETE',          headers: { 'Authorization': 'Bearer ' + token }        });        const data = await res.json();        if (!res.ok) { showAlert('error', data.error || 'Hata'); return; }        showAlert('success', 'Dil silindi');        loadLanguages();      } catch (err) {        showAlert('error', 'Silinirken hata oluştu');      }    }    
    async function btnAction(btn, label, verb, actionFn) {
      var origHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ' + label + '...';
      try {
        await actionFn();
        btn.innerHTML = '<span class="btn-check-icon">\u2713</span> ' + verb;
        btn.className = btn.className.replace(/\b(?:btn-primary|btn-danger|btn-ghost)\b/g,'').trim() + ' btn-success';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace('btn-success', 'btn-primary'); }, 2200);
      } catch(e) {
        btn.innerHTML = '\u2717 Hata';
        btn.className += ' btn-error';
        setTimeout(function() { btn.innerHTML = origHTML; btn.disabled = false; btn.className = btn.className.replace(/ btn-error/g,''); }, 2200);
      }
    }
    async function loadLanguages() {      const token = getToken();      const tbody = document.getElementById('langTableBody');      try {        const res = await fetch(API + '/api/admin/languages', { headers: { 'Authorization': 'Bearer ' + token } });        const langs = await res.json();        if (!Array.isArray(langs)) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Dil bulunamadı</td></tr>'; return; }        tbody.innerHTML = langs.map(l => `          <tr>            <td style="color:var(--text-muted);font-size:0.8rem;">${l.id}</td>            <td><code style="background:rgba(212,168,83,0.1);padding:2px 8px;border-radius:4px;font-size:0.8rem;">${l.code}</code></td>            <td>${l.name}</td>            <td style="font-size:1.3rem;">${l.flag || '-'}</td>            <td>${l.is_default ? '?' : '—'}</td>            <td>${l.is_active ? '?' : '?'}</td>            <td>              <button class="btn btn-primary btn-sm" onclick='openEditModal(${JSON.stringify(l).replace(/'/g, "\\'")})'>Düzenle</button>              ${l.is_default ? '' : `<button class="btn btn-danger btn-sm" onclick="deleteLanguage(${l.id})">Sil</button>`}            </td>          </tr>        `).join('');      } catch (err) {        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Yüklenemedi</td></tr>';      }    }    loadLanguages();  </script></body></html>
