<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VHEORA | ADMIN</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="admin.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Ürünler</h1>
        <p class="page-subtitle">Koleksiyon ürünlerini yönetin.</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Yeni Ürün</button>
    </div>
    <div class="table-container" id="productsContainer">
      <p class="empty-state">Yükleniyor...</p>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 class="modal-title" id="modalTitle">Yeni Ürün</h2>
      <form id="productForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label>Ürün Adı *</label>
            <input type="text" id="prodName" required>
          </div>
          <div class="form-group">
            <label>Kategori *</label>
          <select id="prodCategory" required>
            <option value="">Seçin</option>
            <option value="altin_yuzuk">Altın Yüzük</option>
            <option value="altin_kolye">Altın Kolye</option>
            <option value="altin_bileklik">Altın Bileklik</option>
            <option value="altin_kupe">Altın Küpe</option>
            <option value="pirantali_tek_tas">Pırlantalı Tek Taş</option>
            <option value="altin_alyans">Altın Alyans</option>
          </select>
          </div>
        </div>
        <div class="form-group">
          <label>Açıklama</label>
          <textarea id="prodDescription"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>İşçilik Fiyatı (₺)</label>
            <input type="number" id="prodLaborCost" placeholder="2500" value="2500" min="0" step="50">
          </div>
          <div class="form-group">
            <label>Gram</label>
            <input type="text" id="prodGram" placeholder="Örn: 3.5g">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Rozet</label>
            <input type="text" id="prodBadge" placeholder="Örn: Yeni, İndirim">
          </div>
          <div class="form-group">
            <label>Öne Çıkan</label>
            <select id="prodFeatured">
              <option value="0">Hayır</option>
              <option value="1">Evet</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sıra</label>
            <input type="number" id="prodSortOrder" placeholder="0" value="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>Görseller (maks. 10)</label>
          <input type="file" id="prodImages" accept="image/*" multiple>
          <div id="imagePreviewList" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn btn-primary" id="saveProductBtn">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">Emin misiniz?</h3>
      <p id="confirmText">Bu işlem geri alınamaz.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" onclick="closeConfirm()">İptal</button>
        <button class="btn btn-danger" id="confirmBtn">Sil</button>
      </div>
    </div>
  </div>
  <div id="adminToast" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <script src="shared-functions.js"></script>
  <script>
    initSidebar('products');

    function readFileAsDataURL(file) {
      return new Promise(function(resolve) {
        if (!file.type.startsWith('image/')) {
          var r = new FileReader();
          r.onload = function() { resolve(r.result); };
          r.readAsDataURL(file);
          return;
        }
        var img = new Image();
        var url = URL.createObjectURL(file);
        img.onload = function() {
          var maxW = 800, maxH = 800;
          var w = img.width, h = img.height;
          if (w > maxW || h > maxH) {
            var ratio = Math.min(maxW / w, maxH / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          var canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
          URL.revokeObjectURL(url);
        };
        img.onerror = function() {
          var r = new FileReader();
          r.onload = function() { resolve(r.result); };
          r.readAsDataURL(file);
          URL.revokeObjectURL(url);
        };
        img.src = url;
      });
    }

    function openModal(product) {
      var previewList = document.getElementById('imagePreviewList');
      var fileInput = document.getElementById('prodImages');
      previewList.innerHTML = '';
      fileInput.value = '';
      if (product) {
        document.getElementById('modalTitle').textContent = 'Ürün Düzenle';
        document.getElementById('editId').value = product.id;
        document.getElementById('prodName').value = product.name;
        document.getElementById('prodCategory').value = product.category;
        document.getElementById('prodDescription').value = product.description || '';
        document.getElementById('prodLaborCost').value = product.labor_cost || 2500;
        document.getElementById('prodGram').value = product.gram || '';
        document.getElementById('prodBadge').value = product.badge || '';
        document.getElementById('prodFeatured').value = product.is_featured ? '1' : '0';
        document.getElementById('prodSortOrder').value = product.sort_order || 0;
        var imgs = product.images && product.images.length ? product.images : (product.image ? [product.image] : []);
        imgs.forEach(function(src) {
          var img = document.createElement('img');
          img.src = src;
          img.style.cssText = 'width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid rgba(212,168,83,0.3);';
          previewList.appendChild(img);
        });
      } else {
        document.getElementById('modalTitle').textContent = 'Yeni Ürün';
        document.getElementById('editId').value = '';
        document.getElementById('prodName').value = '';
        document.getElementById('prodCategory').value = '';
        document.getElementById('prodDescription').value = '';
        document.getElementById('prodLaborCost').value = '2500';
        document.getElementById('prodGram').value = '';
        document.getElementById('prodBadge').value = '';
        document.getElementById('prodFeatured').value = '0';
        document.getElementById('prodSortOrder').value = '0';
      }
      document.getElementById('modalOverlay').classList.add('active');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    document.getElementById('productForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var token = getToken();
      var editId = document.getElementById('editId').value;
      var isEdit = !!editId;
      var body = {
        name: document.getElementById('prodName').value,
        category: document.getElementById('prodCategory').value,
        description: document.getElementById('prodDescription').value,
        labor_cost: document.getElementById('prodLaborCost').value,
        gram: document.getElementById('prodGram').value,
        badge: document.getElementById('prodBadge').value,
        is_featured: document.getElementById('prodFeatured').value,
        sort_order: document.getElementById('prodSortOrder').value
      };
      var fileInput = document.getElementById('prodImages');
      if (fileInput.files.length > 0) {
        var allImages = [];
        for (var i = 0; i < Math.min(fileInput.files.length, 10); i++) {
          allImages.push(await readFileAsDataURL(fileInput.files[i]));
        }
        body.images_data = allImages;
      }
      var url = isEdit ? API + '/api/products/' + editId : API + '/api/products';
      var method = isEdit ? 'PUT' : 'POST';
      try {
        var res = await fetch(url, {
          method: method,
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var data = await res.json();
        if (res.ok) {
          closeModal();
          loadProducts();
          adminToast(isEdit ? 'Güncellendi' : 'Eklendi', 'Ürün başarıyla ' + (isEdit ? 'güncellendi' : 'eklendi') + '.', 'success');
        } else {
          adminToast('Hata', data.error || 'Bir hata oluştu', 'error');
        }
      } catch (err) {
        adminToast('Sunucu Hatası', 'Sunucuya bağlanılamadı.', 'error');
      }
    });

    async function deleteProduct(id, btn) {
      var confirmed = await showConfirm('Ürünü Sil', 'Bu ürün kalıcı olarak silinecek.');
      if (!confirmed) return;
      var token = getToken();
      await btnAction(btn, 'Siliniyor', 'Silindi', async function() {
        await fetch(API + '/api/products/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        loadProducts();
      });
    }

    async function loadProducts() {
      var container = document.getElementById('productsContainer');
      try {
        var products = await fetchJSON(API + '/api/products');
        if (products == null) return;
        if (!products.length) {
          container.innerHTML = '<p class="empty-state">Henüz ürün eklenmemiş.</p>';
          return;
        }
        container.innerHTML = '<table><thead><tr><th>Görsel</th><th>Ad</th><th>Kategori</th><th>Gram</th><th>İşçilik</th><th>Rozet</th><th>Sıra</th><th>Öne Çıkan</th><th style="text-align:right;">İşlem</th></tr></thead><tbody>' +
          products.map(function(p) {
            var imgSrc = p.images && p.images.length ? p.images[0] : (p.image ? (p.image.startsWith('data:') ? p.image : API + p.image) : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><rect fill="%23111118" width="50" height="50"/></svg>');
            var imgCount = p.images && p.images.length ? p.images.length : (p.image ? 1 : 0);
                var catColors = { altin_yuzuk: '#d4a853', altin_kolye: '#5cb3e0', altin_bileklik: '#e07c4f', altin_kupe: '#b07cd4', pirantali_tek_tas: '#5ce0a0', altin_alyans: '#f0d080' };
                var catLabels = { altin_yuzuk: 'Altın Yüzük', altin_kolye: 'Altın Kolye', altin_bileklik: 'Altın Bileklik', altin_kupe: 'Altın Küpe', pirantali_tek_tas: 'Pırlantalı Tek Taş', altin_alyans: 'Altın Alyans' };
                var catLabel = catLabels[p.category] || p.category;
                var catColor = catColors[p.category] || '#d4a853';
            return '<tr><td><img src="' + imgSrc + '" alt="' + p.name + '" class="product-thumb">' + (imgCount > 1 ? '<span style="position:relative;top:-40px;left:-10px;background:var(--color-gold);color:#000;font-size:0.55rem;padding:2px 5px;border-radius:8px;font-weight:700;">' + imgCount + '</span>' : '') + '</td>' +
              '<td style="font-weight:500;">' + p.name + '</td>' +
              '<td><span class="badge" style="background:' + catColor + '15;color:' + catColor + ';">' + catLabel + '</span></td>' +
              '<td>' + (p.gram || '-') + '</td>' +
              '<td>' + (p.labor_cost ? p.labor_cost.toLocaleString('tr-TR') + ' ₺' : '-') + '</td>' +
              '<td>' + (p.badge || '-') + '</td>' +
              '<td>' + (p.sort_order || 0) + '</td>' +
              '<td>' + (p.is_featured ? '\u2605' : '-') + '</td>' +
              '<td style="text-align:right;">' +
              '<button class="btn btn-sm btn-primary" onclick=\'openModal(' + JSON.stringify(p) + ')\'>\u270F\uFE0F</button> ' +
              '<button class="btn btn-sm btn-danger" onclick="deleteProduct(' + p.id + ', this)">\uD83D\uDDD1\uFE0F</button>' +
              '</td></tr>';
          }).join('') +
          '</tbody></table>';
      } catch (err) {
        container.innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';
      }
    }
    loadProducts();
  </script>
</body>
</html>
