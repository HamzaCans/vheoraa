<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0D3A35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>VHEORA | JEWELRY</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{width:100%;height:100%;overflow:hidden;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;touch-action:manipulation}
    body{background:#0D3A35;color:#FBF6F0;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;width:100%;height:100%;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:space-between;position:fixed;inset:0;touch-action:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

    .sparkles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .sparkle{position:absolute;width:2px;height:2px;background:#D4A853;border-radius:50%;animation:sparkle 4s ease-in-out infinite;opacity:0}
    @keyframes sparkle{0%,100%{opacity:0;transform:translateY(0)}50%{opacity:.5;transform:translateY(-30px)}}

    .content{position:relative;z-index:1;text-align:center;width:100%;max-width:700px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:clamp(20px,5vh,40px) clamp(20px,5vw,24px) clamp(12px,3vh,24px)}

    .header{flex-shrink:0}
    .logo{font-family:'Montserrat',sans-serif;font-size:clamp(2.2rem,8vw,3.8rem);font-weight:200;letter-spacing:clamp(4px,2.5vw,12px);color:#D4A853;margin-bottom:4px;line-height:1.1}
    .logo-sub{font-family:'Montserrat',sans-serif;font-size:clamp(.65rem,2.2vw,.8rem);letter-spacing:clamp(3px,2vw,8px);text-transform:uppercase;color:#B1B7AB;font-weight:300;line-height:1}

    .diamond-outer{flex-shrink:0;width:clamp(130px,35vw,260px);height:clamp(130px,35vw,260px);position:relative;overflow:hidden;margin:clamp(8px,2vh,16px) 0}
    .diamond-container{position:absolute;top:50%;left:50%;width:120px;height:120px;transform:translate(-50%,-50%)}

    .orbit{position:absolute;top:50%;left:50%;border:1px solid rgba(212,168,83,.12);border-radius:50%;transform:translate(-50%,-50%)}
    .orbit-1{width:168px;height:168px;animation:orbitSpin 20s linear infinite}
    .orbit-2{width:210px;height:210px;animation:orbitSpin 30s linear infinite reverse}
    .orbit-3{width:258px;height:258px;animation:orbitSpin 25s linear infinite}
    @keyframes orbitSpin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}

    .square-outer{position:absolute;top:50%;left:50%;width:144px;height:144px;transform:translate(-50%,-50%);border:1px solid rgba(39,97,82,.4);animation:squareSpinCW 18s linear infinite}
    .square-inner{position:absolute;top:50%;left:50%;width:102px;height:102px;transform:translate(-50%,-50%);border:1.5px solid rgba(177,183,171,.3);animation:squareSpinCCW 12s linear infinite}
    .square-micro{position:absolute;top:50%;left:50%;width:60px;height:60px;transform:translate(-50%,-50%);border:1px solid rgba(212,168,83,.2);animation:squareSpinCW 8s linear infinite}
    @keyframes squareSpinCW{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes squareSpinCCW{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(-360deg)}}

    .star{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2rem;color:#D4A853;animation:starPulse 3s ease-in-out infinite;filter:drop-shadow(0 0 15px rgba(212,168,83,.5)) drop-shadow(0 0 30px rgba(212,168,83,.25));line-height:1}
    @keyframes starPulse{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}}

    .glow-center{position:absolute;top:50%;left:50%;width:96px;height:96px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(212,168,83,.18),rgba(212,168,83,.06) 40%,transparent 70%);border-radius:50%;animation:glowPulse 3s ease-in-out infinite}
    @keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}

    .middle{flex:1 1 auto;width:100%;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
    h1{font-family:'Montserrat',sans-serif;font-size:clamp(1.5rem,6vw,2.6rem);font-weight:200;letter-spacing:clamp(.5px,1vw,1.5px);margin-bottom:clamp(8px,2vh,16px);color:#FBF6F0;line-height:1.2;text-align:center;word-wrap:break-word;overflow-wrap:break-word;max-width:100%;padding:0 8px}
    .desc{font-family:'Montserrat',sans-serif;font-size:clamp(.9rem,3vw,1.1rem);line-height:1.7;color:#B1B7AB;font-weight:300;max-width:460px;width:100%;margin:0 auto;text-align:center;word-wrap:break-word;overflow-wrap:break-word;padding:0 8px}

    .footer{flex-shrink:0}
    .divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,#D4A853,transparent);margin:0 auto clamp(10px,2vh,24px)}
    .status{font-family:'Montserrat',sans-serif;font-size:clamp(.75rem,2.5vw,.9rem);letter-spacing:clamp(2px,1vw,4px);text-transform:uppercase;color:#D4A853;font-weight:400;opacity:.85}
    .status-dot{display:inline-block;width:8px;height:8px;background:#D4A853;border-radius:50%;margin-right:8px;vertical-align:middle;animation:statusBlink 2s ease-in-out infinite}
    @keyframes statusBlink{0%,100%{opacity:1;box-shadow:0 0 8px rgba(212,168,83,.6)}50%{opacity:.25;box-shadow:none}}
    .footer-email{margin-top:clamp(8px,2vh,20px);padding-bottom:env(safe-area-inset-bottom,0)}
    .footer-email a{color:rgba(177,183,171,.6);text-decoration:none;font-family:'Montserrat',sans-serif;font-size:clamp(.7rem,2.2vw,.85rem);letter-spacing:2px;font-weight:300;transition:color .3s}
    .footer-email a:hover{color:#D4A853}

    .social-links{display:flex;gap:clamp(14px,3vw,22px);justify-content:center;margin-top:clamp(20px,4vh,36px);margin-bottom:clamp(8px,2vh,16px);flex-shrink:0}
    .social-btn{display:flex;align-items:center;justify-content:center;width:clamp(40px,10vw,48px);height:clamp(40px,10vw,48px);border:1px solid rgba(39,97,82,.4);border-radius:50%;background:rgba(39,97,82,.1);color:#B1B7AB;text-decoration:none;transition:all .3s ease}
    .social-btn:hover,.social-btn:active{background:rgba(39,97,82,.25);border-color:#D4A853;color:#D4A853;transform:translateY(-1px);box-shadow:0 4px 16px rgba(13,58,53,.3)}
    .social-icon{width:clamp(17px,4vw,20px);height:clamp(17px,4vw,20px)}
    .social-icon svg{width:100%;height:100%;fill:currentColor}

    @media(max-width:480px){
      .diamond-outer{width:180px;height:180px}
      .diamond-container{width:100px;height:100px}
      .orbit-1{width:140px;height:140px}
      .orbit-2{width:175px;height:175px}
      .orbit-3{width:215px;height:215px}
      .square-outer{width:120px;height:120px}
      .square-inner{width:85px;height:85px}
      .square-micro{width:50px;height:50px}
      .star{font-size:1.8rem}
      .glow-center{width:80px;height:80px}
      h1{font-size:clamp(1.3rem,5.5vw,2rem);margin-bottom:8px}
      .desc{font-size:clamp(.85rem,3vw,1rem);line-height:1.65}
      .status{letter-spacing:1.5px}
    }

    @media(max-width:360px){
      .logo{letter-spacing:3px}
      .logo-sub{letter-spacing:2px;font-size:.58rem}
      .diamond-outer{width:155px;height:155px}
      .diamond-container{width:85px;height:85px}
      .orbit-1{width:120px;height:120px}
      .orbit-2{width:155px;height:155px}
      .orbit-3{width:190px;height:190px}
      .square-outer{width:105px;height:105px}
      .square-inner{width:75px;height:75px}
      .square-micro{width:44px;height:44px}
      .star{font-size:1.5rem}
      .glow-center{width:68px;height:68px}
      h1{letter-spacing:.3px;font-size:1.25rem}
      .desc{font-size:.88rem}
    }

    @media(max-height:600px){
      .diamond-outer{width:110px;height:110px}
      .diamond-container{width:70px;height:70px}
      .orbit-1{width:100px;height:100px}
      .orbit-2{width:130px;height:130px}
      .orbit-3{width:160px;height:160px}
      .square-outer{width:90px;height:90px}
      .square-inner{width:65px;height:65px}
      .square-micro{width:38px;height:38px}
      .star{font-size:1.3rem}
      .glow-center{width:55px;height:55px}
      .logo{font-size:1.8rem}
      h1{font-size:1.15rem}
      .desc{font-size:.82rem}
    }

    @media(max-height:500px){
      .diamond-outer{width:90px;height:90px}
      .diamond-container{width:55px;height:55px}
      .logo{font-size:1.5rem}
      h1{font-size:1rem}
      .desc{font-size:.75rem;line-height:1.5}
    }

    @media(prefers-reduced-motion:reduce){
      .sparkle,.orbit,.square-outer,.square-inner,.square-micro,.star,.glow-center,.status-dot{animation:none!important}
      .star{opacity:.9}
      .status-dot{opacity:1;box-shadow:0 0 8px rgba(212,168,83,.6)}
    }
  </style>
</head>
<body>
  <div class="sparkles" id="sparkles"></div>

  <div class="content">
    <div class="header">
      <div class="logo">VHEORA</div>
      <div class="logo-sub">VHEORA &#124; JEWELRY</div>
    </div>

    <div class="diamond-outer">
      <div class="diamond-container">
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
        <div class="orbit orbit-3"></div>
        <div class="glow-center"></div>
        <div class="square-outer"></div>
        <div class="square-inner"></div>

      </div>
      <div class="status"><span class="status-dot"></span>Bakım Çalışması Devam Ediyor</div>
      <div class="footer-email">
        <a href="mailto:vheora.co@gmail.com">vheora.co@gmail.com</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('gesturestart',function(e){e.preventDefault()});
    document.addEventListener('gesturechange',function(e){e.preventDefault()});
    document.addEventListener('gestureend',function(e){e.preventDefault()});
    document.addEventListener('touchstart',function(e){if(e.touches.length>1)e.preventDefault()},{passive:false});
    var lastTouchEnd=0;
    document.addEventListener('touchend',function(e){var n=Date.now();if(n-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=n},{passive:false});
    document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault()},{passive:false});
    document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault()});

    (function(){
      var c=document.getElementById('sparkles');
      for(var i=0;i<30;i++){
        var s=document.createElement('div');
        s.className='sparkle';
        s.style.left=Math.random()*100+'%';
        s.style.top=Math.random()*100+'%';
        s.style.animationDelay=Math.random()*4+'s';
        s.style.animationDuration=(3+Math.random()*3)+'s';
        c.appendChild(s);
      }
      var api=window.location.hostname==='vheora.com'||window.location.hostname==='www.vheora.com'?'https://vheora.vercel.app':(window.location.origin.indexOf('localhost')>-1&&window.location.port!=='3001'?'http://localhost:3001':'');
      fetch(api+'/api/settings/public').then(function(r){return r.json()}).then(function(d){
        var t=document.getElementById('maintenanceTitle');
        var m=document.getElementById('maintenanceMessage');
        if(t&&d.maintenance_title)t.textContent=d.maintenance_title;
        if(m&&d.maintenance_message)m.textContent=d.maintenance_message;
      }).catch(function(){});
    })();
  </script>
</body>
</html>
