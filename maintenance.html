<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0D3A35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  <title>VHEORA | JEWELRY</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=optional" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{width:100%;height:100%;overflow:hidden;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;touch-action:manipulation}
    body{background:#0D3A35;color:#FBF6F0;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;width:100%;height:100%;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;position:fixed;inset:0;touch-action:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

    .sparkles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .sparkle{position:absolute;width:2px;height:2px;background:#D4A853;border-radius:50%;animation:sparkle 4s ease-in-out infinite;opacity:0}
    @keyframes sparkle{0%,100%{opacity:0;transform:translateY(0)}50%{opacity:.5;transform:translateY(-30px)}}

    .content{position:relative;z-index:1;text-align:center;width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:0;padding:clamp(20px,5vh,40px) clamp(20px,5vw,24px) clamp(12px,3vh,24px);padding-top:max(clamp(20px,5vh,40px),env(safe-area-inset-top,0px))}

    .header{flex-shrink:0;margin-bottom:clamp(6px,1.5vh,12px)}
    .logo{font-family:'Montserrat',sans-serif;font-size:clamp(2rem,7vw,3.4rem);font-weight:200;letter-spacing:clamp(4px,2.5vw,12px);color:#D4A853;margin-bottom:4px;line-height:1.1}
    .logo-sub{font-family:'Montserrat',sans-serif;font-size:clamp(.6rem,2vw,.75rem);letter-spacing:clamp(3px,2vw,8px);text-transform:uppercase;color:#B1B7AB;font-weight:300;line-height:1}

    .diamond-outer{flex-shrink:0;width:clamp(100px,28vw,160px);height:clamp(100px,28vw,160px);position:relative;overflow:hidden;margin:clamp(4px,1vh,8px) 0}
    .diamond-container{position:absolute;top:50%;left:50%;width:90px;height:90px;transform:translate(-50%,-50%)}

    .orbit{position:absolute;top:50%;left:50%;border:1px solid rgba(212,168,83,.12);border-radius:50%;transform:translate(-50%,-50%)}
    .orbit-1{width:100px;height:100px;animation:orbitSpin 20s linear infinite}
    .orbit-2{width:130px;height:130px;animation:orbitSpin 30s linear infinite reverse}
    .orbit-3{width:155px;height:155px;animation:orbitSpin 25s linear infinite}
    @keyframes orbitSpin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}

    .square-outer{position:absolute;top:50%;left:50%;width:105px;height:105px;transform:translate(-50%,-50%);border:1px solid rgba(39,97,82,.4);animation:squareSpinCW 18s linear infinite}
    .square-inner{position:absolute;top:50%;left:50%;width:72px;height:72px;transform:translate(-50%,-50%);border:1.5px solid rgba(177,183,171,.3);animation:squareSpinCCW 12s linear infinite}
    .square-micro{position:absolute;top:50%;left:50%;width:42px;height:42px;transform:translate(-50%,-50%);border:1px solid rgba(212,168,83,.2);animation:squareSpinCW 8s linear infinite}
    @keyframes squareSpinCW{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes squareSpinCCW{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(-360deg)}}

    .star{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;color:#D4A853;animation:starPulse 3s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(212,168,83,.5)) drop-shadow(0 0 24px rgba(212,168,83,.25));line-height:1}
    @keyframes starPulse{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}}

    .glow-center{position:absolute;top:50%;left:50%;width:70px;height:70px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(212,168,83,.18),rgba(212,168,83,.06) 40%,transparent 70%);border-radius:50%;animation:glowPulse 3s ease-in-out infinite}
    @keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}

    .middle{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(10px,2vh,16px) 0;position:relative;z-index:2}
    h1{font-family:'Montserrat',sans-serif;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:200;letter-spacing:clamp(.5px,1vw,1.5px);margin-bottom:clamp(6px,1.5vh,12px);color:#FBF6F0;line-height:1.25;text-align:center;word-wrap:break-word;overflow-wrap:break-word;max-width:100%;padding:0 8px}
    .desc{font-family:'Montserrat',sans-serif;font-size:clamp(.85rem,2.8vw,1.05rem);line-height:1.7;color:#B1B7AB;font-weight:300;max-width:460px;width:100%;margin:0 auto;text-align:center;word-wrap:break-word;overflow-wrap:break-word;padding:0 8px}

    .footer{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
    .divider{width:0;height:1px;background:linear-gradient(90deg,transparent,#D4A853,transparent);margin:0 auto clamp(10px,2vh,20px);animation:dividerExpand 1.5s ease-out .5s forwards}
    @keyframes dividerExpand{0%{width:0;opacity:0}100%{width:80px;opacity:1}}
    .divider::after{content:'';position:absolute;left:50%;top:-1px;width:0;height:3px;background:radial-gradient(circle,rgba(212,168,83,.4),transparent);transform:translateX(-50%);animation:dividerGlow 2s ease-in-out 1.5s infinite;pointer-events:none}
    @keyframes dividerGlow{0%,100%{width:0;opacity:0}50%{width:40px;opacity:1}}
    .social-links{display:flex;gap:clamp(14px,3vw,22px);justify-content:center;margin-bottom:clamp(6px,1.5vh,12px);flex-shrink:0}
    .social-btn{display:flex;align-items:center;justify-content:center;width:clamp(38px,9vw,44px);height:clamp(38px,9vw,44px);border:1px solid rgba(39,97,82,.4);border-radius:50%;background:rgba(39,97,82,.1);color:#B1B7AB;text-decoration:none;transition:all .3s ease;-webkit-tap-highlight-color:transparent}
    .social-btn:hover,.social-btn:active{background:rgba(39,97,82,.25);border-color:#D4A853;color:#D4A853;transform:translateY(-1px);box-shadow:0 4px 16px rgba(13,58,53,.3)}
    .social-btn:active{transform:scale(.95);transition-duration:.1s}
    .social-icon{width:clamp(16px,4vw,18px);height:clamp(16px,4vw,18px)}
    .social-icon svg{width:100%;height:100%;fill:currentColor}
    .status{font-family:'Montserrat',sans-serif;font-size:clamp(.7rem,2.2vw,.85rem);letter-spacing:clamp(2px,1vw,4px);text-transform:uppercase;color:#D4A853;font-weight:400;opacity:.85}
    .status-dot{display:inline-block;width:7px;height:7px;background:#D4A853;border-radius:50%;margin-right:8px;vertical-align:middle;animation:statusBlink 2s ease-in-out infinite}
    @keyframes statusBlink{0%,100%{opacity:1;box-shadow:0 0 8px rgba(212,168,83,.6)}50%{opacity:.25;box-shadow:none}}
    .footer-email{margin-top:clamp(8px,2vh,16px);padding-bottom:env(safe-area-inset-bottom,0px)}
    .footer-email a{color:rgba(177,183,171,.6);text-decoration:none;font-family:'Montserrat',sans-serif;font-size:clamp(.65rem,2vw,.8rem);letter-spacing:2px;font-weight:300;transition:color .3s;-webkit-tap-highlight-color:transparent;min-height:44px;display:inline-flex;align-items:center}
    .footer-email a:hover{color:#D4A853}

    @media(max-width:480px){
      .diamond-outer{width:120px;height:120px}
      .diamond-container{width:80px;height:80px}
      .orbit-1{width:85px;height:85px}
      .orbit-2{width:110px;height:110px}
      .orbit-3{width:135px;height:135px}
      .square-outer{width:90px;height:90px}
      .square-inner{width:62px;height:62px}
      .square-micro{width:36px;height:36px}
      .star{font-size:1.5rem}
      .glow-center{width:58px;height:58px}
      h1{font-size:clamp(1.2rem,5vw,1.8rem);margin-bottom:6px}
      .desc{font-size:clamp(.8rem,2.8vw,.95rem);line-height:1.65}
      .status{letter-spacing:1.5px}
    }

    @media(max-width:360px){
      .logo{letter-spacing:3px}
      .logo-sub{letter-spacing:2px;font-size:.55rem}
      .diamond-outer{width:100px;height:100px}
      .diamond-container{width:68px;height:68px}
      .orbit-1{width:72px;height:72px}
      .orbit-2{width:92px;height:92px}
      .orbit-3{width:115px;height:115px}
      .square-outer{width:78px;height:78px}
      .square-inner{width:54px;height:54px}
      .square-micro{width:30px;height:30px}
      .star{font-size:1.3rem}
      .glow-center{width:48px;height:48px}
      h1{letter-spacing:.3px;font-size:1.15rem}
      .desc{font-size:.82rem}
    }

    @media(max-height:700px){
      .diamond-outer{width:100px;height:100px}
      .diamond-container{width:70px;height:70px}
      .orbit-1{width:78px;height:78px}
      .orbit-2{width:100px;height:100px}
      .orbit-3{width:125px;height:125px}
      .square-outer{width:82px;height:82px}
      .square-inner{width:58px;height:58px}
      .square-micro{width:32px;height:32px}
      .star{font-size:1.3rem}
      .glow-center{width:50px;height:50px}
      .logo{font-size:1.8rem}
      h1{font-size:1.2rem}
      .desc{font-size:.82rem}
    }

    @media(max-height:550px){
      .diamond-outer{width:80px;height:80px}
      .diamond-container{width:55px;height:55px}
      .orbit-1{width:62px;height:62px}
      .orbit-2{width:80px;height:80px}
      .orbit-3{width:100px;height:100px}
      .square-outer{width:68px;height:68px}
      .square-inner{width:48px;height:48px}
      .square-micro{width:26px;height:26px}
      .star{font-size:1.1rem}
      .glow-center{width:42px;height:42px}
      .logo{font-size:1.5rem}
      h1{font-size:1rem}
      .desc{font-size:.75rem;line-height:1.5}
    }

    @media(prefers-reduced-motion:reduce){
      .sparkle,.orbit,.square-outer,.square-inner,.square-micro,.star,.glow-center,.status-dot,.divider{animation:none!important}
      .star{opacity:.9}
      .status-dot{opacity:1;box-shadow:0 0 8px rgba(212,168,83,.6)}
      .divider{width:80px;opacity:1}
    }

    @media(orientation:landscape) and (max-height:500px){
      body{height:auto;min-height:100vh;min-height:100dvh}
      .content{height:auto;min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top,12px) clamp(16px,4vw,24px) env(safe-area-inset-bottom,12px)}
      .diamond-outer{width:80px;height:80px;margin:6px 0}
      .diamond-container{width:55px;height:55px}
      .orbit-1{width:62px;height:62px}
      .orbit-2{width:80px;height:80px}
      .orbit-3{width:100px;height:100px}
      .square-outer{width:65px;height:65px}
      .square-inner{width:46px;height:46px}
      .square-micro{width:26px;height:26px}
      .star{font-size:1rem}
      .glow-center{width:40px;height:40px}
      .logo{font-size:1.3rem}
      .logo-sub{font-size:.5rem}
      h1{font-size:.95rem;margin-bottom:4px}
      .desc{font-size:.72rem;line-height:1.4}
      .status{font-size:.65rem}
      .social-links{margin:8px 0 6px}
    }

    @media(max-height:550px) and (orientation:portrait){
      .content{padding:14px clamp(16px,4vw,24px) 8px}
      .diamond-outer{width:80px;height:80px;margin:4px 0}
      .logo{font-size:1.5rem}
      h1{font-size:1rem}
      .desc{font-size:.78rem}
      .social-links{margin:8px 0 4px}
    }
  </style>
</head>
<body>
