<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <title>Bakım Modu | VHEORA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      color: #f5f5f5;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.03;
    }
    .shape-1 {
      width: 600px; height: 600px;
      background: #d4a853;
      top: -200px; right: -200px;
      animation: float 20s ease-in-out infinite;
    }
    .shape-2 {
      width: 400px; height: 400px;
      background: #f0c27f;
      bottom: -150px; left: -150px;
      animation: float 25s ease-in-out infinite reverse;
    }
    .shape-3 {
      width: 300px; height: 300px;
      border: 1px solid #d4a853;
      background: transparent;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -40px); }
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.03; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.06; }
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #d4a853, #f0c27f, #d4a853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .logo-sub {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.7rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #8a8a9a;
      margin-bottom: 48px;
    }
    .icon-ring {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      border: 2px solid rgba(212, 168, 83, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: shimmer 3s ease-in-out infinite;
    }
    .icon-ring::before {
      content: '✦';
      font-size: 2rem;
      color: #d4a853;
      opacity: 0.8;
    }
    .icon-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(212, 168, 83, 0.1);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.15); opacity: 0; }
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: #f5f5f5;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #8a8a9a;
      margin-bottom: 40px;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4a853, transparent);
      margin: 0 auto 32px;
    }
    .status {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4a853;
      opacity: 0.7;
    }
    .status span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #f0c27f;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1.5s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #d4a853;
      border-radius: 50%;
      animation: sparkle 4s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: translateY(0); }
      50% { opacity: 0.5; transform: translateY(-30px); }
    }
    @media (max-width: 480px) {
      .logo { font-size: 2.2rem; letter-spacing: 4px; }
      h1 { font-size: 1.6rem; }
      p { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="sparkles" id="sparkles"></div>
  <div class="content">
    <div class="logo">VHEORA</div>
    <div class="logo-sub">Fine Jewelry</div>
    <div class="icon-ring"></div>
    <div class="divider"></div>
    <h1 id="maintenanceTitle">Yakında Hizmetinizdeyiz</h1>
    <p id="maintenanceMessage">Sizler için çalışıyoruz. En kısa sürede muhteşem deneyimle sizlerle olacağız.</p>
    <div class="status"><span></span>Bakım Çalışması</div>
  </div>
  <script>
    (function() {
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = Math.random() * 100 + '%';
        el.style.animationDelay = Math.random() * 4 + 's';
        el.style.animationDuration = (3 + Math.random() * 3) + 's';
        document.getElementById('sparkles').appendChild(el);
      }
      const api = window.location.origin.includes('localhost') && window.location.port !== '3001' ? 'http://localhost:3001' : '';
      fetch(api + '/api/settings/public')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var t = document.getElementById('maintenanceTitle');
          var m = document.getElementById('maintenanceMessage');
          if (t && d.maintenance_title) t.textContent = d.maintenance_title;
          if (m && d.maintenance_message) m.textContent = d.maintenance_message;
        })
        .catch(function() {});
    })();
  </script>
</body>
</html>
