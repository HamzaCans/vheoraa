services:
  - type: web
    name: vheora
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vheora-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: vheora.co@gmail.com

databases:
  - name: vheora-db
    databaseName: vheora
    plan: free
    region: frankfurt
